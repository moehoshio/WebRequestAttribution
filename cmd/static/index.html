<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Request Attribution</title>
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: rgba(30, 41, 59, 0.8);
            --bg-card-hover: rgba(51, 65, 85, 0.9);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border: rgba(148, 163, 184, 0.1);
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --accent-glow: rgba(99, 102, 241, 0.3);
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --gradient-1: linear-gradient(135deg, #6366f1, #8b5cf6);
            --gradient-2: linear-gradient(135deg, #06b6d4, #3b82f6);
            --gradient-3: linear-gradient(135deg, #10b981, #06b6d4);
            --gradient-4: linear-gradient(135deg, #f59e0b, #ef4444);
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
            --shadow-lg: 0 8px 40px rgba(0, 0, 0, 0.4);
            --radius: 16px;
            --radius-sm: 10px;
        }

        [data-theme="light"] {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --bg-card: rgba(255, 255, 255, 0.9);
            --bg-card-hover: rgba(248, 250, 252, 1);
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --border: rgba(148, 163, 184, 0.2);
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 8px 40px rgba(0, 0, 0, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            transition: background 0.3s ease, color 0.3s ease;
        }

        /* Background decoration */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 20% 50%, rgba(99, 102, 241, 0.08) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 20%, rgba(139, 92, 246, 0.06) 0%, transparent 50%),
                        radial-gradient(ellipse at 50% 80%, rgba(6, 182, 212, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1440px;
            margin: 0 auto;
            padding: 32px 24px;
            position: relative;
            z-index: 1;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .language-switcher,
        .theme-toggle {
            height: 40px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-primary);
            backdrop-filter: blur(12px);
            transition: all 0.2s ease;
        }

        .language-switcher {
            padding: 0 12px;
            cursor: pointer;
            font-size: 14px;
        }

        .language-switcher:hover,
        .theme-toggle:hover {
            background: var(--bg-card-hover);
        }

        .theme-toggle {
            width: 40px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .theme-toggle:hover {
            transform: scale(1.05);
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            border-radius: var(--radius) var(--radius) 0 0;
        }

        .stat-card:nth-child(1)::before { background: var(--gradient-1); }
        .stat-card:nth-child(2)::before { background: var(--gradient-2); }
        .stat-card:nth-child(3)::before { background: var(--gradient-3); }
        .stat-card:nth-child(4)::before { background: var(--gradient-4); }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .stat-card .stat-icon {
            font-size: 24px;
            margin-bottom: 12px;
        }

        .stat-card h3 {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-card .value {
            font-size: 32px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -1px;
        }

        /* Filters Panel */
        .filters {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow);
            margin-bottom: 32px;
        }

        .filters-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            cursor: pointer;
        }

        .filters-header h2 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filters-header .toggle-icon {
            font-size: 12px;
            color: var(--text-muted);
            transition: transform 0.3s ease;
        }

        .filters-header .toggle-icon.collapsed {
            transform: rotate(-90deg);
        }

        .filter-body {
            overflow: hidden;
            transition: max-height 0.3s ease, opacity 0.3s ease;
            max-height: 400px;
            opacity: 1;
        }

        .filter-body.collapsed {
            max-height: 0;
            opacity: 0;
        }

        .filter-row {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 16px;
            align-items: end;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .filter-group label {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
            letter-spacing: 0.3px;
        }

        .filter-group input,
        .filter-group select {
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            transition: all 0.2s ease;
            outline: none;
        }

        .filter-group input:focus,
        .filter-group select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .filter-group input::placeholder {
            color: var(--text-muted);
        }

        .filter-actions {
            display: flex;
            gap: 10px;
            align-items: end;
            padding-top: 6px;
        }

        .filter-hint {
            margin-top: 10px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background: var(--gradient-1);
            color: #fff;
            box-shadow: 0 2px 12px var(--accent-glow);
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 20px var(--accent-glow);
        }

        .btn-secondary {
            background: var(--bg-secondary);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--bg-card-hover);
            color: var(--text-primary);
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 24px;
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 6px;
            width: fit-content;
        }

        .tab {
            padding: 10px 24px;
            cursor: pointer;
            border-radius: var(--radius-sm);
            font-weight: 500;
            font-size: 14px;
            color: var(--text-secondary);
            transition: all 0.2s ease;
            user-select: none;
        }

        .tab:hover {
            color: var(--text-primary);
            background: var(--bg-secondary);
        }

        .tab.active {
            color: #fff;
            background: var(--gradient-1);
            box-shadow: 0 2px 8px var(--accent-glow);
        }

        /* Panels */
        .panel {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 28px;
            box-shadow: var(--shadow);
            margin-bottom: 24px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Charts */
        .chart-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 28px;
        }

        .chart-box {
            min-height: 200px;
        }

        .chart-box h3 {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .bar-chart {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .bar-item {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .bar-label {
            /* Fixed width (not min-width) so every bar track starts at the
               same x position regardless of how long the label text is. */
            flex: 0 0 130px;
            width: 130px;
            font-size: 13px;
            font-weight: 500;
            text-align: right;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: var(--text-secondary);
        }

        .bar-track {
            flex: 1;
            height: 28px;
            background: var(--bg-secondary);
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .bar-fill {
            height: 100%;
            border-radius: 8px;
            display: flex;
            align-items: center;
            padding-left: 12px;
            font-size: 12px;
            color: #fff;
            font-weight: 600;
            min-width: fit-content;
            transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .bar-fill.grad-1 { background: var(--gradient-1); }
        .bar-fill.grad-2 { background: var(--gradient-2); }
        .bar-fill.grad-3 { background: var(--gradient-3); }
        .bar-fill.grad-4 { background: var(--gradient-4); }
        .bar-fill.grad-5 { background: linear-gradient(135deg, #ec4899, #8b5cf6); }
        .bar-fill.grad-6 { background: linear-gradient(135deg, #14b8a6, #a3e635); }
        .bar-fill.grad-7 { background: linear-gradient(135deg, #f97316, #eab308); }

        /* Chart view switcher (bars / donut / trend) */
        .chart-toolbar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
        }
        .chart-view-switch {
            display: inline-flex;
            gap: 4px;
            padding: 4px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
        }
        .chart-view-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 14px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            background: transparent;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }
        .chart-view-btn:hover { color: var(--text-primary); }
        .chart-view-btn.active {
            color: #fff;
            background: var(--gradient-1);
        }

        /* Donut (circular percentage) charts */
        .donut-chart {
            display: flex;
            align-items: center;
            gap: 22px;
            flex-wrap: wrap;
        }
        .donut-svg { flex: 0 0 auto; }
        .donut-center-value {
            font-size: 22px;
            font-weight: 700;
            fill: var(--text-primary);
        }
        .donut-center-label {
            font-size: 9px;
            fill: var(--text-secondary);
        }
        .donut-legend {
            flex: 1;
            min-width: 160px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .donut-legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-secondary);
        }
        .donut-dot {
            flex: 0 0 auto;
            width: 11px;
            height: 11px;
            border-radius: 3px;
        }
        .donut-legend-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .donut-legend-pct {
            font-weight: 600;
            color: var(--text-primary);
        }

        /* Trend (requests over time) chart */
        .trend-box { grid-column: 1 / -1; }
        .trend-svg { width: 100%; height: auto; display: block; }
        .trend-area { opacity: 0.18; }
        .trend-line { fill: none; stroke-width: 2.5; }
        .trend-dot { transition: r 0.15s; }
        .trend-grid-line { stroke: var(--border); stroke-width: 1; }
        .trend-axis-label { font-size: 10px; fill: var(--text-secondary); }

        /* ===== Hover animations (overview charts) ===== */
        /* Bars: lift + brighten the hovered row, and grow the fill slightly. */
        .bar-item { transition: transform 0.15s ease; }
        .bar-item:hover { transform: translateX(2px); }
        .bar-item:hover .bar-label { color: var(--text-primary); }
        .bar-item .bar-fill { transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1), filter 0.15s ease, box-shadow 0.15s ease, transform 0.15s ease; transform-origin: left center; }
        .bar-item:hover .bar-fill { filter: brightness(1.12) saturate(1.1); box-shadow: 0 2px 14px var(--accent-glow); transform: scaleY(1.08); }

        /* Donut: dim non-hovered slices, pop the hovered one. The .is-hovering
           flag is toggled by JS so siblings only dim while a slice is active. */
        .donut-seg { transition: opacity 0.18s ease, stroke-width 0.18s ease; cursor: pointer; }
        .donut-svg.is-hovering .donut-seg { opacity: 0.3; }
        .donut-svg.is-hovering .donut-seg.hovered { opacity: 1; stroke-width: 20; }
        .donut-legend-item { transition: color 0.15s ease, transform 0.15s ease; cursor: pointer; border-radius: 6px; padding: 2px 4px; }
        .donut-legend-item:hover { color: var(--text-primary); transform: translateX(2px); background: var(--bg-secondary); }

        /* Trend: interactive hover guideline + focus dot + floating label. */
        .trend-dot { transition: r 0.15s ease; cursor: pointer; }
        .trend-dot:hover { r: 6; }
        .trend-hover-line { stroke: var(--accent); stroke-width: 1; stroke-dasharray: 4 4; opacity: 0; transition: opacity 0.12s ease; }
        .trend-focus { opacity: 0; transition: opacity 0.12s ease; }
        .trend-tip-bg { fill: var(--bg-secondary); stroke: var(--border); stroke-width: 1; }
        .trend-tip-date { font-size: 11px; fill: var(--text-secondary); }
        .trend-tip-val { font-size: 13px; font-weight: 700; fill: var(--text-primary); }
        .trend-hit { fill: transparent; cursor: pointer; }

        /* Realtime status dot. */
        .live-badge { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-secondary); font-weight: 500; }
        .live-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--success); box-shadow: 0 0 0 0 rgba(16,185,129,0.6); animation: livePulse 1.6s infinite; }
        @keyframes livePulse {
            0% { box-shadow: 0 0 0 0 rgba(16,185,129,0.55); }
            70% { box-shadow: 0 0 0 7px rgba(16,185,129,0); }
            100% { box-shadow: 0 0 0 0 rgba(16,185,129,0); }
        }

        /* ===== Custom layout (composable dashboard) ===== */
        .custom-toolbar { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .custom-toolbar .custom-cols { display: inline-flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-secondary); }
        .custom-toolbar .custom-cols select { padding: 6px 8px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg-secondary); color: var(--text-primary); }
        .chart-toolbar { display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }

        .custom-layout {
            display: grid;
            grid-auto-rows: minmax(220px, auto);
            gap: 20px;
        }
        .widget {
            position: relative;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 8px 16px 16px;
            overflow: hidden;
            transition: box-shadow 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
            display: flex; flex-direction: column;
        }
        .widget:hover { box-shadow: var(--shadow-lg); border-color: var(--accent); }
        .widget.dragging { opacity: 0.5; }
        .widget.drag-over { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
        .widget .widget-head {
            display: flex; align-items: center; gap: 6px;
            padding: 8px 2px 6px; cursor: grab;
        }
        .widget .widget-head:active { cursor: grabbing; }
        .widget .widget-grip { color: var(--text-muted); font-size: 14px; }
        .widget .widget-title { flex: 1; font-size: 13px; font-weight: 600; color: var(--text-secondary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .widget .widget-ctrls { display: flex; gap: 2px; opacity: 0; transition: opacity 0.15s ease; }
        .widget:hover .widget-ctrls { opacity: 1; }
        .widget .w-btn {
            border: 1px solid var(--border); background: var(--bg-card); color: var(--text-secondary);
            border-radius: 6px; width: 24px; height: 24px; cursor: pointer; font-size: 13px;
            display: inline-flex; align-items: center; justify-content: center; line-height: 1; transition: all 0.15s ease;
        }
        .widget .w-btn:hover { color: var(--text-primary); border-color: var(--accent); background: var(--bg-card-hover); }
        .widget .w-btn.danger:hover { color: var(--danger); border-color: var(--danger); }
        .widget .widget-body { flex: 1; min-height: 0; overflow: auto; }
        .widget .widget-body .chart-box { min-height: 0; }
        .widget .widget-body .chart-box > h3 { display: none; }
        .custom-empty { grid-column: 1 / -1; }
        @media (max-width: 768px) {
            .custom-layout { grid-template-columns: 1fr !important; }
            .widget { grid-column: auto !important; grid-row: auto !important; }
        }

        /* Table */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th, td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        th {
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: var(--bg-secondary);
            position: sticky;
            top: 0;
        }

        tr {
            transition: background 0.15s ease;
        }

        tr:hover {
            background: var(--bg-card-hover);
        }

        td {
            color: var(--text-primary);
        }

        .status-badge {
            display: inline-flex;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-2xx { background: rgba(16, 185, 129, 0.15); color: #10b981; }
        .status-3xx { background: rgba(99, 102, 241, 0.15); color: #818cf8; }
        .status-4xx { background: rgba(245, 158, 11, 0.15); color: #f59e0b; }
        .status-5xx { background: rgba(239, 68, 68, 0.15); color: #ef4444; }

        /* Pagination */
        .pagination {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-top: 20px;
            justify-content: center;
        }

        .page-info {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        /* No data state */
        .empty-state {
            text-align: center;
            padding: 48px 20px;
            color: var(--text-muted);
        }

        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state p {
            font-size: 15px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container { padding: 16px; }
            .header { flex-direction: column; align-items: flex-start; }
            .header h1 { font-size: 22px; }
            .header-actions { width: 100%; justify-content: flex-end; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .stat-card { padding: 16px; }
            .stat-card .value { font-size: 24px; }
            .chart-container { grid-template-columns: 1fr; }
            .filter-row { grid-template-columns: 1fr 1fr; }
            .tabs { width: 100%; }
            .tab { flex: 1; text-align: center; padding: 10px 12px; font-size: 13px; }
        }

        @media (max-width: 480px) {
            .stats-grid { grid-template-columns: 1fr; }
            .filter-row { grid-template-columns: 1fr; }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }

        /* Auth overlay (Phase 2) */
        .auth-overlay {
            position: fixed; inset: 0; z-index: 1000;
            background: var(--bg-primary);
            display: flex; align-items: center; justify-content: center;
            padding: 20px;
        }
        .auth-card {
            background: var(--bg-card); backdrop-filter: blur(10px);
            border: 1px solid var(--border); border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            padding: 32px; width: 100%; max-width: 380px;
        }
        .auth-card h2 { margin-bottom: 8px; color: var(--text-primary); }
        .auth-card .subtitle { color: var(--text-secondary); margin-bottom: 24px; font-size: 14px; }
        .auth-card label { display: block; color: var(--text-secondary); font-size: 13px; margin: 12px 0 6px; }
        .auth-card input {
            width: 100%; padding: 10px 12px; background: var(--bg-secondary);
            border: 1px solid var(--border); border-radius: var(--radius-sm);
            color: var(--text-primary); font-size: 14px;
        }
        .auth-card input:focus { outline: none; border-color: var(--accent); }
        .auth-card .btn-primary { width: 100%; margin-top: 20px; }
        .auth-card .error {
            color: var(--danger); font-size: 13px; min-height: 18px; margin-top: 12px;
        }
        .user-menu {
            display: flex; align-items: center; gap: 10px;
            color: var(--text-secondary); font-size: 13px;
        }
        .user-menu .badge {
            background: var(--accent); color: #fff;
            padding: 2px 8px; border-radius: 999px; font-size: 11px; text-transform: uppercase;
        }
        .users-table { width: 100%; }
        .users-table th, .users-table td { padding: 10px; text-align: left; border-bottom: 1px solid var(--border); }
        .users-table .actions { display: flex; gap: 6px; flex-wrap: wrap; }
        .users-form { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; align-items: end; margin-bottom: 20px; }
        .users-form input, .users-form select {
            padding: 8px 10px; background: var(--bg-secondary);
            border: 1px solid var(--border); border-radius: var(--radius-sm);
            color: var(--text-primary); font-size: 14px;
        }
        .map-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; backdrop-filter: blur(12px); box-shadow: var(--shadow); }
        .map-head { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap; margin-bottom: 4px; }
        .map-head h3 { font-size: 16px; }
        .map-wrap { width: 100%; position: relative; }
        .map-wrap svg { width: 100%; height: auto; display: block; }
        .map-graticule { stroke: var(--border); stroke-width: 1; fill: none; }
        .map-land { fill: var(--text-muted); opacity: 0.16; stroke: var(--text-muted); stroke-opacity: 0.25; stroke-width: 0.5; }
        .map-marker { fill: var(--accent); fill-opacity: 0.55; stroke: var(--accent-hover); stroke-width: 1; cursor: pointer; transition: fill-opacity 0.15s ease; }
        .map-marker:hover, .map-marker.hovered { fill-opacity: 0.9; stroke-width: 1.5; }
        /* Map hover tooltip — same look as the trend chart's floating label. */
        .map-tooltip { position: absolute; left: 0; top: 0; pointer-events: none; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; box-shadow: var(--shadow); opacity: 0; transition: opacity 0.12s ease; white-space: nowrap; z-index: 5; }
        .map-tooltip .cap { display: block; font-size: 10px; font-weight: 600; color: var(--accent); }
        .map-tooltip .name { display: block; font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
        .map-tooltip .val { display: block; font-size: 13px; font-weight: 700; color: var(--text-primary); margin-top: 2px; }
        .map-legend { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; }
        .map-legend .chip { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border: 1px solid var(--border); border-radius: 999px; background: var(--bg-secondary); font-size: 13px; }
        .map-legend .chip b { color: var(--accent-hover); }
        .hidden { display: none !important; }

        /* ===== Settings panel (modern, unified) ===== */
        .settings-section {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 22px 24px;
            margin-bottom: 20px;
        }
        .settings-section .section-head {
            display: flex; align-items: center; gap: 10px; margin-bottom: 4px;
        }
        .settings-section .section-head .ico { font-size: 18px; }
        .settings-section h3 { font-size: 16px; font-weight: 600; color: var(--text-primary); }
        .settings-section .section-hint {
            font-size: 13px; color: var(--text-secondary); margin: 2px 0 18px;
        }
        .settings-section h3.bare { margin-bottom: 16px; }

        /* Read-only bootstrap info as definition rows */
        .info-grid { display: flex; flex-direction: column; gap: 1px; }
        .info-grid .info-row {
            display: grid; grid-template-columns: 240px 1fr; gap: 16px;
            padding: 12px 14px; align-items: center;
            border-radius: var(--radius-sm);
        }
        .info-grid .info-row:nth-child(odd) { background: var(--bg-card); }
        .info-grid .info-key { font-size: 13px; font-weight: 600; color: var(--text-secondary); }
        .info-grid .info-val {
            font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
            font-size: 13px; color: var(--text-primary); word-break: break-all;
        }

        /* Generic field layout used across settings */
        .field { display: flex; flex-direction: column; gap: 6px; }
        .field > label {
            font-size: 12px; font-weight: 600; color: var(--text-secondary);
            letter-spacing: 0.3px;
        }
        .settings-section input[type="text"],
        .settings-section select {
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            outline: none;
            width: 100%;
        }
        .settings-section input[type="text"]:focus,
        .settings-section select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        .settings-section input[type="text"]::placeholder { color: var(--text-muted); }

        .runtime-grid {
            display: grid; grid-template-columns: 220px 1fr; gap: 18px 20px;
            align-items: center;
        }
        .runtime-grid > label {
            font-size: 13px; font-weight: 600; color: var(--text-secondary);
        }

        /* Modern toggle switch */
        .switch { position: relative; display: inline-flex; align-items: center; gap: 12px; cursor: pointer; }
        .switch input { position: absolute; opacity: 0; width: 0; height: 0; }
        .switch .track {
            width: 42px; height: 24px; border-radius: 999px;
            background: var(--bg-card-hover); border: 1px solid var(--border);
            transition: background 0.2s ease; flex-shrink: 0; position: relative;
        }
        .switch .track::after {
            content: ''; position: absolute; top: 2px; left: 2px;
            width: 18px; height: 18px; border-radius: 50%;
            background: var(--text-muted); transition: transform 0.2s ease, background 0.2s ease;
        }
        .switch input:checked + .track { background: var(--accent); border-color: var(--accent); }
        .switch input:checked + .track::after { transform: translateX(18px); background: #fff; }
        .switch input:focus-visible + .track { box-shadow: 0 0 0 3px var(--accent-glow); }
        .switch .switch-text { font-size: 13px; color: var(--text-secondary); }

        /* Source cards */
        .source-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 16px 18px;
            margin-bottom: 14px;
        }
        .source-card .source-card-head {
            display: flex; align-items: center; justify-content: space-between;
            gap: 12px; margin-bottom: 16px;
        }
        .source-card .source-type-badge {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 4px 12px; border-radius: 999px;
            background: var(--accent-glow); color: var(--accent-hover);
            font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .source-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 14px; align-items: end;
        }
        .source-grid .span-2 { grid-column: span 2; }
        .source-grid .inline-check {
            display: flex; align-items: center; gap: 8px;
            font-size: 13px; color: var(--text-secondary); padding-bottom: 10px;
        }
        .source-grid .inline-check input { width: 16px; height: 16px; accent-color: var(--accent); }

        /* Path input with an attached Browse button */
        .input-with-btn { display: flex; gap: 8px; }
        .input-with-btn input { flex: 1; }
        .btn-browse {
            flex-shrink: 0; padding: 0 14px; border-radius: var(--radius-sm);
            border: 1px solid var(--border); background: var(--bg-secondary);
            color: var(--text-secondary); cursor: pointer; font-size: 14px;
            display: inline-flex; align-items: center; gap: 6px; transition: all 0.2s ease;
        }
        .btn-browse:hover { background: var(--bg-card-hover); color: var(--text-primary); border-color: var(--accent); }

        .btn-icon-danger {
            padding: 8px 14px; border-radius: var(--radius-sm); border: 1px solid var(--border);
            background: transparent; color: var(--danger); cursor: pointer; font-size: 13px;
            font-weight: 600; transition: all 0.2s ease;
        }
        .btn-icon-danger:hover { background: rgba(239, 68, 68, 0.12); border-color: var(--danger); }

        .add-source-bar { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 4px; }

        /* ===== Modal / file picker ===== */
        .modal-overlay {
            position: fixed; inset: 0; z-index: 1100;
            background: rgba(2, 6, 23, 0.6); backdrop-filter: blur(4px);
            display: flex; align-items: center; justify-content: center; padding: 20px;
            animation: fadeIn 0.15s ease;
        }
        .modal {
            background: var(--bg-secondary); border: 1px solid var(--border);
            border-radius: var(--radius); box-shadow: var(--shadow-lg);
            width: 100%; max-width: 640px; max-height: 80vh; display: flex; flex-direction: column;
            overflow: hidden;
        }
        .modal-head {
            display: flex; align-items: center; justify-content: space-between; gap: 12px;
            padding: 18px 22px; border-bottom: 1px solid var(--border);
        }
        .modal-head h3 { font-size: 16px; font-weight: 600; }
        .modal-close {
            background: transparent; border: none; color: var(--text-muted); cursor: pointer;
            font-size: 22px; line-height: 1; padding: 0 4px; transition: color 0.2s ease;
        }
        .modal-close:hover { color: var(--text-primary); }
        .modal-path {
            padding: 10px 22px; font-family: ui-monospace, Menlo, Consolas, monospace;
            font-size: 13px; color: var(--text-secondary); background: var(--bg-primary);
            border-bottom: 1px solid var(--border); word-break: break-all;
        }
        .modal-body { overflow-y: auto; flex: 1; padding: 8px 0; }
        .browse-item {
            display: flex; align-items: center; gap: 12px; padding: 11px 22px;
            cursor: pointer; transition: background 0.12s ease; font-size: 14px;
            color: var(--text-primary); border: none; background: transparent; width: 100%; text-align: left;
        }
        .browse-item:hover { background: var(--bg-card-hover); }
        .browse-item .b-ico { font-size: 16px; width: 20px; text-align: center; }
        .browse-item .b-name { flex: 1; word-break: break-all; }
        .browse-item .b-size { font-size: 12px; color: var(--text-muted); }
        .browse-item.is-up { color: var(--text-secondary); }
        .browse-empty { padding: 28px 22px; text-align: center; color: var(--text-muted); font-size: 14px; }
        .modal-foot {
            display: flex; align-items: center; justify-content: space-between; gap: 12px;
            padding: 16px 22px; border-top: 1px solid var(--border); flex-wrap: wrap;
        }
        .modal-foot .foot-hint { font-size: 12px; color: var(--text-muted); }
        .modal-foot .foot-actions { display: flex; gap: 10px; margin-left: auto; }
        .modal-error { color: var(--danger); font-size: 13px; padding: 0 22px 12px; }

        @media (max-width: 640px) {
            .runtime-grid { grid-template-columns: 1fr; gap: 8px 0; }
            .info-grid .info-row { grid-template-columns: 1fr; gap: 4px; }
            .source-grid .span-2 { grid-column: span 1; }
        }
    </style>
</head>
<body>
    <!-- Auth overlay: shown until /api/auth/me succeeds. -->
    <div id="authOverlay" class="auth-overlay hidden">
        <div class="auth-card">
            <h2 data-i18n="auth_signin"></h2>
            <p class="subtitle" data-i18n="auth_signin_subtitle"></p>
            <form id="loginForm" onsubmit="return doLogin(event)">
                <label data-i18n="auth_username"></label>
                <input type="text" id="loginUsername" autocomplete="username" required>
                <label data-i18n="auth_password"></label>
                <input type="password" id="loginPassword" autocomplete="current-password" required>
                <button type="submit" class="btn btn-primary" data-i18n="auth_signin_btn"></button>
                <div id="loginError" class="error"></div>
            </form>
        </div>
    </div>

    <div class="container">
        <!-- First-run / no-account-mode banner. Shown when /api/auth/me
             reports the server has zero users (so it's running in
             "no-account mode") or when no log sources are configured. -->
        <div id="setupBanner" class="hidden" style="background: var(--bg-secondary); border: 1px solid var(--border); border-left: 4px solid var(--accent, #5b8def); border-radius: var(--radius-sm); padding: 16px 20px; margin: 16px 0; display: flex; gap: 16px; align-items: center; flex-wrap: wrap;">
            <div style="font-size: 28px;" aria-hidden="true">🚀</div>
            <div style="flex: 1; min-width: 260px;">
                <div id="setupBannerTitle" style="font-weight: 600; margin-bottom: 4px;" data-i18n="setup_banner_title"></div>
                <div id="setupBannerBody" class="subtitle" data-i18n="setup_banner_body"></div>
            </div>
            <div style="display: flex; gap: 8px; flex-wrap: wrap;">
                <button class="btn btn-primary" onclick="openSetup()" data-i18n="setup_banner_btn"></button>
                <button class="btn btn-secondary" onclick="dismissSetupBanner()" data-i18n="setup_banner_dismiss"></button>
            </div>
        </div>
        <div class="header">
            <h1>📊 Web Request Attribution</h1>
            <div class="header-actions">
                <div id="userMenu" class="user-menu hidden">
                    <span id="userMenuName"></span>
                    <span id="userMenuRole" class="badge"></span>
                    <button class="btn btn-secondary" onclick="changeOwnPassword()" data-i18n="auth_change_password"></button>
                    <button class="btn btn-secondary" onclick="doLogout()" data-i18n="auth_logout"></button>
                </div>
                <select id="languageSwitcher" class="language-switcher" onchange="setLanguage(this.value)" data-i18n-title="language" data-i18n-aria-label="language">
                    <option value="zh-TW">繁體中文</option>
                    <option value="zh-CN">简体中文</option>
                    <option value="en">English</option>
                    <option value="ja">日本語</option>
                </select>
                <button class="theme-toggle" onclick="toggleTheme()" data-i18n-title="toggle_theme" data-i18n-aria-label="toggle_theme">🌓</button>
            </div>
        </div>

        <div class="tabs">
            <div class="tab active" data-tab="overview" onclick="switchTab('overview')"><span aria-hidden="true">📈</span> <span data-i18n="tab_overview"></span></div>
            <div class="tab" data-tab="map" onclick="switchTab('map')"><span aria-hidden="true">🗺️</span> <span data-i18n="tab_map"></span></div>
            <div class="tab" data-tab="requests" onclick="switchTab('requests')"><span aria-hidden="true">📋</span> <span data-i18n="tab_requests"></span></div>
            <div class="tab hidden" id="tabUsersHandle" data-tab="users" onclick="switchTab('users')"><span aria-hidden="true">👥</span> <span data-i18n="tab_users"></span></div>
            <div class="tab hidden" id="tabSettingsHandle" data-tab="settings" onclick="switchTab('settings')"><span aria-hidden="true">⚙️</span> <span data-i18n="tab_settings"></span></div>
        </div>

        <div class="filters">
            <div class="filters-header" onclick="toggleFilters()">
                <h2><span>🔍</span> <span data-i18n="filters_title"></span></h2>
                <span class="toggle-icon collapsed" id="filterToggleIcon">▼</span>
            </div>
            <div class="filter-body collapsed" id="filterBody">
                <div class="filter-row">
                    <div class="filter-group">
                        <label data-i18n="start_date"></label>
                        <input type="date" id="filterStart">
                    </div>
                    <div class="filter-group">
                        <label data-i18n="end_date"></label>
                        <input type="date" id="filterEnd">
                    </div>
                    <div class="filter-group">
                        <label data-i18n="ip"></label>
                        <input type="text" id="filterIP" data-i18n-placeholder="ip_placeholder">
                    </div>
                    <div class="filter-group">
                        <label data-i18n="path"></label>
                        <input type="text" id="filterPath" data-i18n-placeholder="path_placeholder">
                    </div>
                    <div class="filter-group">
                        <label data-i18n="domain"></label>
                        <input type="text" id="filterDomain" data-i18n-placeholder="domain_placeholder">
                    </div>
                    <div class="filter-group">
                        <label data-i18n="query"></label>
                        <input type="text" id="filterQuery" data-i18n-placeholder="query_placeholder">
                    </div>
                    <div class="filter-group">
                        <label data-i18n="os"></label>
                        <select id="filterOS">
                            <option value="" data-i18n="all"></option>
                            <option value="Windows">Windows</option>
                            <option value="macOS">macOS</option>
                            <option value="Linux">Linux</option>
                            <option value="iOS">iOS</option>
                            <option value="Android">Android</option>
                            <option value="Other" data-i18n="other"></option>
                            <option value="!Windows">✕ Windows</option>
                            <option value="!macOS">✕ macOS</option>
                            <option value="!Linux">✕ Linux</option>
                            <option value="!iOS">✕ iOS</option>
                            <option value="!Android">✕ Android</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label data-i18n="browser"></label>
                        <select id="filterBrowser">
                            <option value="" data-i18n="all"></option>
                            <option value="Chrome">Chrome</option>
                            <option value="Firefox">Firefox</option>
                            <option value="Safari">Safari</option>
                            <option value="Edge">Edge</option>
                            <option value="Opera">Opera</option>
                            <option value="Bot">Bot</option>
                            <option value="Other" data-i18n="other"></option>
                            <option value="!Chrome">✕ Chrome</option>
                            <option value="!Firefox">✕ Firefox</option>
                            <option value="!Safari">✕ Safari</option>
                            <option value="!Edge">✕ Edge</option>
                            <option value="!Opera">✕ Opera</option>
                            <option value="!Bot">✕ Bot</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label data-i18n="status_code"></label>
                        <input type="text" id="filterStatus" inputmode="numeric" data-i18n-placeholder="status_placeholder">
                    </div>
                    <div class="filter-group">
                        <label data-i18n="keyword"></label>
                        <input type="text" id="filterKeyword" data-i18n-placeholder="keyword_placeholder">
                    </div>
                    <div class="filter-actions">
                        <button class="btn btn-primary" onclick="applyFilters()" data-i18n="search"></button>
                        <button class="btn btn-secondary" onclick="clearFilters()" data-i18n="clear"></button>
                    </div>
                </div>
                <p class="filter-hint" data-i18n="filter_exclude_hint"></p>
            </div>
        </div>

        <div id="tab-overview" class="panel">
            <div class="stats-grid" id="statsCards"></div>
            <div class="chart-toolbar">
                <div class="chart-view-switch" role="tablist">
                    <button type="button" class="chart-view-btn" data-view="realtime" onclick="setChartView('realtime')"><span aria-hidden="true">🟢</span> <span data-i18n="view_realtime"></span></button>
                    <button type="button" class="chart-view-btn" data-view="trend" onclick="setChartView('trend')"><span aria-hidden="true">📈</span> <span data-i18n="view_trend"></span></button>
                    <button type="button" class="chart-view-btn" data-view="bars" onclick="setChartView('bars')"><span aria-hidden="true">📊</span> <span data-i18n="view_bars"></span></button>
                    <button type="button" class="chart-view-btn" data-view="donut" onclick="setChartView('donut')"><span aria-hidden="true">🍩</span> <span data-i18n="view_donut"></span></button>
                    <button type="button" class="chart-view-btn" data-view="custom" onclick="setChartView('custom')"><span aria-hidden="true">🧩</span> <span data-i18n="view_custom"></span></button>
                </div>
                <div id="customToolbar" class="custom-toolbar hidden">
                    <button type="button" class="btn btn-primary" onclick="openWidgetPicker()"><span aria-hidden="true">➕</span> <span data-i18n="layout_add_widget"></span></button>
                    <label class="custom-cols"><span data-i18n="layout_columns"></span>
                        <select id="layoutCols" onchange="setLayoutCols(this.value)">
                            <option value="2">2</option>
                            <option value="3">3</option>
                            <option value="4">4</option>
                            <option value="5">5</option>
                            <option value="6">6</option>
                        </select>
                    </label>
                    <button type="button" class="btn btn-secondary" onclick="resetLayout()"><span aria-hidden="true">↺</span> <span data-i18n="layout_reset"></span></button>
                </div>
            </div>
            <div class="chart-container" id="charts"></div>
            <div id="customLayout" class="custom-layout hidden"></div>
        </div>

        <div id="tab-map" class="panel" style="display:none;">
            <div class="map-card">
                <div class="map-head">
                    <h3>🗺️ <span data-i18n="tab_map"></span></h3>
                    <span class="subtitle" id="mapTotal"></span>
                </div>
                <p class="subtitle" data-i18n="map_hint" style="margin-bottom:12px;"></p>
                <div id="mapWrap" class="map-wrap"></div>
                <div id="mapEmpty" class="empty-state hidden"><div class="icon">🌍</div><p data-i18n="map_no_data"></p></div>
                <div id="mapLegend" class="map-legend"></div>
            </div>
        </div>

        <div id="tab-requests" class="panel" style="display:none;">
            <div style="overflow-x:auto;">
                <table>
                    <thead>
                        <tr>
                            <th data-i18n="time"></th>
                            <th data-i18n="ip"></th>
                            <th data-i18n="country"></th>
                            <th data-i18n="domain"></th>
                            <th data-i18n="method"></th>
                            <th data-i18n="path"></th>
                            <th data-i18n="query"></th>
                            <th data-i18n="status"></th>
                            <th data-i18n="os"></th>
                            <th data-i18n="browser"></th>
                            <th data-i18n="ua"></th>
                        </tr>
                    </thead>

        function mapLanguage(lang) {
            if (!lang) return null;
            const normalized = lang.toLowerCase();
            if (normalized === 'zh-cn' || normalized === 'zh-sg' || normalized === 'zh-hans') return 'zh-CN';
            if (normalized.startsWith('zh')) return 'zh-TW';
            if (normalized.startsWith('ja')) return 'ja';
            if (normalized.startsWith('en')) return 'en';
            return null;
        }

        function getInitialLanguage() {
            const savedLang = localStorage.getItem('lang');
            if (savedLang && i18n[savedLang]) return savedLang;
            const browserLanguages = Array.isArray(navigator.languages) && navigator.languages.length
                ? navigator.languages
                : [navigator.language];
            for (const lang of browserLanguages) {
                const mapped = mapLanguage(lang);
                if (mapped) return mapped;
            }
            return 'en';
        }

        function t(key, vars) {
            const text = (i18n[currentLang] && i18n[currentLang][key]) || i18n.en[key] || key;
            if (!vars) return text;
            return text.replace(/\{(\w+)\}/g, function(_, name) {
                return Object.prototype.hasOwnProperty.call(vars, name) ? vars[name] : _;
            });
        }

            document.querySelectorAll('[data-i18n-placeholder]').forEach(function(el) {

                el.setAttribute('aria-label', t(el.dataset.i18nAriaLabel));

            const params = new URLSearchParams();

                start: 'filterStart', end: 'filterEnd', ip: 'filterIP',
                path: 'filterPath', domain: 'filterDomain', query: 'filterQuery',
                os: 'filterOS', browser: 'filterBrowser', status: 'filterStatus',

                const val = document.getElementById(id).value;
                if (val) params.set(key, val);
            }
            return params;
