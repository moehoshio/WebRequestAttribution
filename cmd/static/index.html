            loadStats();
            loadRequests();
            loadGeo();
            if (chartViewMode === 'realtime' || (chartViewMode === 'custom' && layoutNeedsRealtime())) {
                loadRealtime();
            }
        }

        function clearFilters() {
            document.querySelectorAll('.filters input, .filters select').forEach(function(el) {
                el.value = '';
            });
            applyFilters();
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(function(t) {
                t.classList.remove('active');
            });
            document.querySelector('[data-tab="' + tab + '"]').classList.add('active');
            document.getElementById('tab-overview').style.display = tab === 'overview' ? 'block' : 'none';
            document.getElementById('tab-map').style.display = tab === 'map' ? 'block' : 'none';
            document.getElementById('tab-requests').style.display = tab === 'requests' ? 'block' : 'none';
            document.getElementById('tab-users').style.display = tab === 'users' ? 'block' : 'none';
            document.getElementById('tab-settings').style.display = tab === 'settings' ? 'block' : 'none';
            if (tab === 'map') loadGeo();
            if (tab === 'requests') loadRequests();
            if (tab === 'users') loadUsers();
            if (tab === 'settings') loadSettings();
            if (tab === 'overview' && (chartViewMode === 'realtime' || (chartViewMode === 'custom' && layoutNeedsRealtime()))) {
                loadRealtime();
            }
            // Pause the live poll whenever the overview isn't on screen.
            syncRealtimeTimer();
        }

        async function loadStats() {
            const params = getFilters();
            try {
                const res = await authFetch('/api/stats?' + params.toString());
                const data = await res.json();
                lastStatsData = data;
                renderStatsCards(data);
                renderCharts(data);
            } catch (e) {
                console.error('Failed to load stats:', e);
            }
        }

        function renderStatsCards(data) {
            const cards = document.getElementById('statsCards');
            const items = [
                { icon: '📊', labelKey: 'total_requests', value: data.total_requests ? data.total_requests.toLocaleString(currentLang) : '0' },
                { icon: '🛤️', labelKey: 'unique_paths', value: data.top_paths ? data.top_paths.length.toLocaleString(currentLang) : '0' },
                { icon: '🌐', labelKey: 'unique_ips', value: data.top_ips ? data.top_ips.length.toLocaleString(currentLang) : '0' },
                { icon: '🏷️', labelKey: 'unique_domains', value: data.top_domains ? data.top_domains.length.toLocaleString(currentLang) : '0' }
            ];
            cards.innerHTML = items.map(function(item) {
                return '<div class="stat-card"><div class="stat-icon">' + item.icon + '</div><h3>' + t(item.labelKey) + '</h3><div class="value">' + item.value + '</div></div>';
            }).join('');
        }

        function renderBarChart(icon, titleKey, items, gradIdx) {
            const title = icon + ' ' + t(titleKey);
            if (!items || items.length === 0) {
                return '<div class="chart-box"><h3>' + title + '</h3><div class="empty-state"><div class="icon">📭</div><p>' + t('no_data') + '</p></div></div>';
            }
            const max = items[0].count;
            const grad = gradients[gradIdx % gradients.length];
            const bars = items.slice(0, 10).map(function(item) {
                const pct = Math.max((item.count / max) * 100, 10);
                const name = item.name || t('empty_value');
                return '<div class="bar-item"><span class="bar-label" title="' + escapeHtml(name) + '">' + escapeHtml(name) + '</span><div class="bar-track"><div class="bar-fill ' + grad + '" style="width:' + pct + '%">' + item.count.toLocaleString(currentLang) + '</div></div></div>';
            }).join('');
            return '<div class="chart-box"><h3>' + title + '</h3><div class="bar-chart">' + bars + '</div></div>';
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.appendChild(document.createTextNode(str == null ? '' : String(str)));
            return div.innerHTML;
        }

        // setChartView switches the overview between display styles (realtime,
        // time trend, bar chart, donut/percentage, or the custom layout) and
        // re-renders using the cached data.
        function setChartView(mode) {
            chartViewMode = CHART_VIEWS.indexOf(mode) === -1 ? 'realtime' : mode;
            localStorage.setItem('chartView', chartViewMode);
            updateChartViewButtons();
            renderCharts(lastStatsData || {});
            syncRealtimeTimer();
            if (chartViewMode === 'realtime' || (chartViewMode === 'custom' && layoutNeedsRealtime())) {
                loadRealtime();
            }
        }

        function updateChartViewButtons() {
            document.querySelectorAll('.chart-view-btn').forEach(function(btn) {
                btn.classList.toggle('active', btn.dataset.view === chartViewMode);
            });
        }

        function renderCharts(data) {
            data = data || {};
            const container = document.getElementById('charts');
            const customHost = document.getElementById('customLayout');
            const customToolbar = document.getElementById('customToolbar');
            const countryItems = geoCountryItems();
            updateChartViewButtons();

            // Toggle between the preset chart grid and the custom dashboard.
            const isCustom = chartViewMode === 'custom';
            container.classList.toggle('hidden', isCustom);
            customHost.classList.toggle('hidden', !isCustom);
            customToolbar.classList.toggle('hidden', !isCustom);

            if (isCustom) {
                renderCustomLayout();
                return;
            }

            if (chartViewMode === 'realtime') {
                container.innerHTML = renderRealtimeChart(lastRealtimeData);
                wireOverviewInteractions(container);
                return;
            }

            if (chartViewMode === 'trend') {
                container.innerHTML = renderTrendChart('📈', 'chart_trend', data.requests_per_day);
                wireOverviewInteractions(container);
                return;
            }

            const render = chartViewMode === 'donut' ? renderDonutChart : renderBarChart;
            container.innerHTML =
                render('🛤️', 'top_paths', data.top_paths, 0) +
                render('🌐', 'top_ips', data.top_ips, 1) +
                render('🗺️', 'chart_countries', countryItems, 2) +
                render('🏷️', 'chart_domains', data.top_domains, 3) +
                render('💻', 'chart_os', data.top_os, 4) +
                render('🌍', 'chart_browsers', data.top_browsers, 5) +
                render('📊', 'chart_status_codes', data.status_codes, 6) +
                render('🔑', 'chart_keywords', data.top_keywords, 0);
            wireOverviewInteractions(container);
        }

        function chartEmptyState(title) {
            return '<div class="chart-box"><h3>' + title + '</h3><div class="empty-state"><div class="icon">📭</div><p>' + t('no_data') + '</p></div></div>';
        }

        // renderDonutChart draws a ring (circular percentage) chart for the top
        // items. The largest slices are shown individually; the long tail is
        // collapsed into an "Others" slice so the ring stays readable.
        function renderDonutChart(icon, titleKey, items, gradIdx) {
            const title = icon + ' ' + t(titleKey);
            if (!items || items.length === 0) return chartEmptyState(title);

            const top = items.slice(0, 6).map(function(it) {
                return { name: it.name || t('empty_value'), count: it.count };
            });
            const shownTotal = top.reduce(function(s, it) { return s + it.count; }, 0);
            const grandTotal = items.reduce(function(s, it) { return s + it.count; }, 0);
            if (grandTotal > shownTotal) {
                top.push({ name: t('donut_others'), count: grandTotal - shownTotal });
            }
            const total = grandTotal || 1;

            // Geometry: a stroke-dasharray ring on a circle of radius r.
            const size = 132, cx = 66, cy = 66, r = 52, circ = 2 * Math.PI * r;
            let offset = 0;
            const segments = top.map(function(it, i) {
                const frac = it.count / total;
                const color = chartColors[(gradIdx + i) % chartColors.length];
                const dash = (frac * circ).toFixed(2) + ' ' + (circ - frac * circ).toFixed(2);
                const pct = Math.round(frac * 100);
                const seg = '<circle class="donut-seg" data-i="' + i + '"' +
                    ' data-name="' + escapeAttr(it.name) + '" data-pct="' + pct + '"' +
                    ' data-count="' + it.count + '"' +
                    ' cx="' + cx + '" cy="' + cy + '" r="' + r +
                    '" fill="none" stroke="' + color + '" stroke-width="16"' +
                    ' stroke-dasharray="' + dash + '"' +
                    ' stroke-dashoffset="' + (-offset).toFixed(2) + '"' +
                    ' transform="rotate(-90 ' + cx + ' ' + cy + ')"></circle>';
                offset += frac * circ;
                return seg;
            }).join('');

            const topPct = Math.round((top[0].count / total) * 100);
            const svg = '<svg class="donut-svg" width="' + size + '" height="' + size +
                '" viewBox="0 0 ' + size + ' ' + size + '" role="img"' +
                ' data-def-val="' + topPct + '%" data-def-label="' + escapeAttr(top[0].name.slice(0, 14)) + '">' +
                '<circle cx="' + cx + '" cy="' + cy + '" r="' + r + '" fill="none" stroke="var(--bg-secondary)" stroke-width="16"></circle>' +
                segments +
                '<text x="' + cx + '" y="' + (cy - 2) + '" text-anchor="middle" class="donut-center-value">' + topPct + '%</text>' +
                '<text x="' + cx + '" y="' + (cy + 14) + '" text-anchor="middle" class="donut-center-label">' + escapeHtml(top[0].name.slice(0, 14)) + '</text>' +
                '</svg>';

            const legend = top.map(function(it, i) {
                const color = chartColors[(gradIdx + i) % chartColors.length];
                const pct = Math.round((it.count / total) * 100);
                return '<div class="donut-legend-item" data-i="' + i + '">' +
                    '<span class="donut-dot" style="background:' + color + '"></span>' +
                    '<span class="donut-legend-name" title="' + escapeHtml(it.name) + '">' + escapeHtml(it.name) + '</span>' +
                    '<span class="donut-legend-pct">' + pct + '% · ' + it.count.toLocaleString(currentLang) + '</span>' +
                    '</div>';
            }).join('');

            return '<div class="chart-box"><h3>' + title + '</h3><div class="donut-chart">' + svg +
                '<div class="donut-legend">' + legend + '</div></div></div>';
        }

        // renderTrendChart draws a full-width area/line chart of requests over
        // time using the requests_per_day series returned by the stats API.
        function renderTrendChart(icon, titleKey, series) {
            const title = icon + ' ' + t(titleKey);
            if (!series || series.length === 0) {
                return '<div class="chart-box trend-box"><h3>' + title + '</h3><div class="empty-state"><div class="icon">📭</div><p>' + t('no_data') + '</p></div></div>';
            }
            return '<div class="chart-box trend-box"><h3>' + title + '</h3>' +
                buildTrendSvg(series, function(p){ return p.date; }, chartColors[0]) + '</div>';
        }

        // renderRealtimeChart draws the live per-minute request trend. The
        // series comes from /api/realtime and is refreshed on a timer; a small
        // "live" badge communicates that it auto-updates.
        function renderRealtimeChart(series) {
            const title = '🟢 ' + t('chart_realtime');
            const badge = '<span class="live-badge"><span class="live-dot"></span>' + t('realtime_live') +
                ' · ' + t('realtime_window', { minutes: realtimeMinutes }) + '</span>';
            const head = '<h3 style="justify-content:space-between;width:100%;"><span>' + title + '</span>' + badge + '</h3>';
            if (!series || series.length === 0) {
                return '<div class="chart-box trend-box">' + head + '<div class="empty-state"><div class="icon">📡</div><p>' + t('no_data') + '</p></div></div>';
            }
            // Show only the minute part (HH:MM) on the axis to keep it tidy.
            const labelOf = function(p){ var m = (p.minute || '').split(' '); return m.length > 1 ? m[1] : (p.minute || ''); };
            return '<div class="chart-box trend-box">' + head +
                buildTrendSvg(series, labelOf, '#10b981') + '</div>';
        }

        // buildTrendSvg renders an interactive area/line trend. `labelOf(point)`
        // produces the x-axis label and tooltip caption; `color` is the line /
        // area / focus colour. Hover surfaces a guideline, an enlarged focus dot
        // and a floating tooltip with the selected bucket and its value.
        function buildTrendSvg(series, labelOf, color) {
            const pts = series.slice();
            const W = 900, H = 280, padL = 48, padR = 20, padT = 20, padB = 36;
            const plotW = W - padL - padR, plotH = H - padT - padB;
            const maxCount = pts.reduce(function(m, p) { return Math.max(m, p.count); }, 0) || 1;
            const n = pts.length;
            const x = function(i) { return padL + (n === 1 ? plotW / 2 : (i / (n - 1)) * plotW); };
            const y = function(c) { return padT + plotH - (c / maxCount) * plotH; };

            let grid = '';
            const steps = 4;
            for (let s = 0; s <= steps; s++) {
                const val = Math.round((maxCount / steps) * s);
                const gy = (padT + plotH - (s / steps) * plotH).toFixed(1);
                grid += '<line class="trend-grid-line" x1="' + padL + '" y1="' + gy + '" x2="' + (W - padR) + '" y2="' + gy + '"></line>' +
                    '<text class="trend-axis-label" x="' + (padL - 8) + '" y="' + (parseFloat(gy) + 3) + '" text-anchor="end">' + val.toLocaleString(currentLang) + '</text>';
            }

            const linePts = pts.map(function(p, i) { return x(i).toFixed(1) + ',' + y(p.count).toFixed(1); }).join(' ');
            const areaPts = x(0).toFixed(1) + ',' + (padT + plotH).toFixed(1) + ' ' + linePts + ' ' + x(n - 1).toFixed(1) + ',' + (padT + plotH).toFixed(1);

            const dots = pts.map(function(p, i) {
                return '<circle class="trend-dot" cx="' + x(i).toFixed(1) + '" cy="' + y(p.count).toFixed(1) + '" r="3" fill="' + color + '"></circle>';
            }).join('');

            const labelEvery = Math.max(1, Math.ceil(n / 8));
            let xLabels = '';
            for (let i = 0; i < n; i += labelEvery) {
                xLabels += '<text class="trend-axis-label" x="' + x(i).toFixed(1) + '" y="' + (H - padB + 18) + '" text-anchor="middle">' + escapeHtml(labelOf(pts[i])) + '</text>';
            }

            // Transparent per-point hit bands drive the hover interaction.
            let hits = '';
            for (let i = 0; i < n; i++) {
                const left = i === 0 ? padL : (x(i - 1) + x(i)) / 2;
                const right = i === n - 1 ? (W - padR) : (x(i) + x(i + 1)) / 2;
                hits += '<rect class="trend-hit" x="' + left.toFixed(1) + '" y="' + padT + '" width="' + Math.max(0, right - left).toFixed(1) + '" height="' + plotH +
                    '" data-cx="' + x(i).toFixed(1) + '" data-cy="' + y(pts[i].count).toFixed(1) +
                    '" data-label="' + escapeAttr(labelOf(pts[i])) + '" data-count="' + pts[i].count + '"></rect>';
            }

            // Hover overlay: guideline, focus dot, and tooltip (hidden by default).
            const overlay =
                '<line class="trend-hover-line" x1="0" y1="' + padT + '" x2="0" y2="' + (padT + plotH) + '"></line>' +
                '<g class="trend-focus">' +
                '<circle class="trend-focus-dot" r="5" fill="' + color + '" stroke="#fff" stroke-width="2" cx="0" cy="0"></circle>' +
                '<g class="trend-tip" transform="translate(0,0)">' +
                '<rect class="trend-tip-bg" rx="6" x="0" y="0" width="150" height="50"></rect>' +
                '<text class="trend-tip-cap" x="10" y="16" style="font-size:10px;fill:var(--accent);font-weight:600;">' + escapeHtml(t('trend_select')) + '</text>' +
                '<text class="trend-tip-date" x="10" y="31"></text>' +
                '<text class="trend-tip-val" x="10" y="46"></text>' +
                '</g></g>';

            const geom = JSON.stringify({ padT: padT, plotH: plotH, W: W, padR: padR, color: color });
            return '<svg class="trend-svg" viewBox="0 0 ' + W + ' ' + H + '" preserveAspectRatio="xMidYMid meet" role="img" data-geom="' + escapeAttr(geom) + '">' +
                grid +
                '<polygon class="trend-area" points="' + areaPts + '" fill="' + color + '"></polygon>' +
                '<polyline class="trend-line" points="' + linePts + '" stroke="' + color + '"></polyline>' +
                dots + xLabels + overlay + hits +
                '</svg>';
        }

        // wireOverviewInteractions attaches hover behaviour to every donut and
        // trend chart found inside `host` (the preset grid or a custom widget).
        function wireOverviewInteractions(host) {
            if (!host) return;
            host.querySelectorAll('.donut-chart').forEach(wireDonut);
            host.querySelectorAll('.trend-svg').forEach(wireTrend);
        }

        function wireDonut(chart) {
            const svg = chart.querySelector('.donut-svg');
            if (!svg) return;
            const valEl = svg.querySelector('.donut-center-value');
            const labEl = svg.querySelector('.donut-center-label');
            const segs = chart.querySelectorAll('.donut-seg');
            const legends = chart.querySelectorAll('.donut-legend-item');
            function focus(i) {
                const seg = chart.querySelector('.donut-seg[data-i="' + i + '"]');
                if (!seg) return;
                svg.classList.add('is-hovering');
                segs.forEach(function(s){ s.classList.toggle('hovered', s === seg); });
                legends.forEach(function(l){ l.style.fontWeight = (l.getAttribute('data-i') === String(i)) ? '700' : ''; });
                if (valEl) valEl.textContent = seg.getAttribute('data-pct') + '%';
                if (labEl) labEl.textContent = (seg.getAttribute('data-name') || '').slice(0, 14);
            }
            function reset() {
                svg.classList.remove('is-hovering');
                segs.forEach(function(s){ s.classList.remove('hovered'); });
                legends.forEach(function(l){ l.style.fontWeight = ''; });
                if (valEl) valEl.textContent = svg.getAttribute('data-def-val') || '';
                if (labEl) labEl.textContent = svg.getAttribute('data-def-label') || '';
            }
            segs.forEach(function(s){
                const i = s.getAttribute('data-i');
                s.addEventListener('mouseenter', function(){ focus(i); });
            });
            legends.forEach(function(l){
                const i = l.getAttribute('data-i');
                l.addEventListener('mouseenter', function(){ focus(i); });
            });
            chart.addEventListener('mouseleave', reset);
        }

        function wireTrend(svg) {
            let geom = {};
            try { geom = JSON.parse(svg.getAttribute('data-geom') || '{}'); } catch (e) {}
            const line = svg.querySelector('.trend-hover-line');
            const focus = svg.querySelector('.trend-focus');
            const focusDot = svg.querySelector('.trend-focus-dot');
            const tip = svg.querySelector('.trend-tip');
            const tipDate = svg.querySelector('.trend-tip-date');
            const tipVal = svg.querySelector('.trend-tip-val');
            const tipW = 150, tipH = 50;
            svg.querySelectorAll('.trend-hit').forEach(function(hit) {
                hit.addEventListener('mouseenter', function() {
                    const cx = parseFloat(hit.getAttribute('data-cx'));
                    const cy = parseFloat(hit.getAttribute('data-cy'));
                    const label = hit.getAttribute('data-label') || '';
                    const count = parseInt(hit.getAttribute('data-count'), 10) || 0;
                    if (line) { line.setAttribute('x1', cx); line.setAttribute('x2', cx); line.style.opacity = 1; }
                    if (focusDot) { focusDot.setAttribute('cx', cx); focusDot.setAttribute('cy', cy); }
                    if (tip) {
                        // Clamp the tooltip so it stays inside the plot area.
                        let tx = cx + 12;
                        if (tx + tipW > (geom.W - geom.padR)) tx = cx - tipW - 12;
                        if (tx < 4) tx = 4;
                        let ty = cy - tipH - 8;
                        if (ty < geom.padT) ty = cy + 10;
                        tip.setAttribute('transform', 'translate(' + tx.toFixed(1) + ',' + ty.toFixed(1) + ')');
                    }
                    if (tipDate) tipDate.textContent = label;
                    if (tipVal) tipVal.textContent = count.toLocaleString(currentLang);
                    if (focus) focus.style.opacity = 1;
                });
            });
            svg.addEventListener('mouseleave', function() {
                if (line) line.style.opacity = 0;
                if (focus) focus.style.opacity = 0;
            });
        }

        // ---- Realtime trend (live per-minute) -------------------------------

        async function loadRealtime() {
            const params = getFilters();
            params.set('minutes', realtimeMinutes);
            try {
                const res = await authFetch('/api/realtime?' + params.toString());
                if (!res.ok) return;
                const data = await res.json();
                lastRealtimeData = data.series || [];
                if (chartViewMode === 'realtime') {
                    renderCharts(lastStatsData || {});
                } else if (chartViewMode === 'custom') {
                    renderCustomLayout();
                }
            } catch (e) {
                console.error('Failed to load realtime:', e);
            }
        }

        // syncRealtimeTimer starts or stops the polling loop based on whether a
        // realtime view is currently on screen (the realtime preset, or a custom
        // layout containing a realtime widget) and the overview tab is visible.
        function syncRealtimeTimer() {
            const overviewVisible = document.getElementById('tab-overview').style.display !== 'none';
            const wantRealtime = overviewVisible && (chartViewMode === 'realtime' ||
                (chartViewMode === 'custom' && layoutNeedsRealtime()));
            if (wantRealtime && !realtimeTimer) {
                realtimeTimer = setInterval(loadRealtime, 5000);
            } else if (!wantRealtime && realtimeTimer) {
                clearInterval(realtimeTimer);
                realtimeTimer = null;
            }
        }

        // ---- Custom overview layout (composable dashboard) ------------------
        // Persisted shape: { cols: number, widgets: [{id,type,metric,w,h}] }.
        // type: 'realtime' | 'trend' | 'bar' | 'donut'; metric applies to
        // bar/donut and keys into METRICS. w/h are grid-cell spans.

        const LAYOUT_KEY = 'overviewLayout';
        let widgetSeq = 1;

        function defaultLayout() {
            return {
                cols: 4,
                widgets: [
                    { id: 'w' + (widgetSeq++), type: 'realtime', w: 4, h: 2 },
                    { id: 'w' + (widgetSeq++), type: 'bar', metric: 'paths', w: 2, h: 2 },
                    { id: 'w' + (widgetSeq++), type: 'donut', metric: 'status', w: 2, h: 2 },
                    { id: 'w' + (widgetSeq++), type: 'bar', metric: 'ips', w: 2, h: 2 },
                    { id: 'w' + (widgetSeq++), type: 'donut', metric: 'browsers', w: 2, h: 2 }
                ]
            };
        }

        let customLayout = loadLayout();

        function loadLayout() {
            try {
                const raw = localStorage.getItem(LAYOUT_KEY);
                if (raw) {
                    const parsed = JSON.parse(raw);
                    if (parsed && Array.isArray(parsed.widgets)) {
                        // Keep widgetSeq ahead of any restored ids.
                        parsed.widgets.forEach(function(w) {
                            const m = /^w(\d+)$/.exec(w.id || '');
                            if (m) widgetSeq = Math.max(widgetSeq, parseInt(m[1], 10) + 1);
                        });
                        parsed.cols = clampCols(parsed.cols);
                        return parsed;
                    }
                }
            } catch (e) {}
            return defaultLayout();
        }

        function saveLayout() {
            try { localStorage.setItem(LAYOUT_KEY, JSON.stringify(customLayout)); } catch (e) {}
        }

        function clampCols(c) { c = parseInt(c, 10) || 4; return Math.min(6, Math.max(2, c)); }
        function clampSpan(v, max) { v = parseInt(v, 10) || 1; return Math.min(max, Math.max(1, v)); }

        function layoutNeedsRealtime() {
            return customLayout.widgets.some(function(w) { return w.type === 'realtime'; });
        }

        function widgetTitle(w) {
            if (w.type === 'realtime') return '🟢 ' + t('chart_realtime');
            if (w.type === 'trend') return '📈 ' + t('chart_trend');
            const m = METRICS[w.metric] || METRICS.paths;
            return m.icon + ' ' + t(m.titleKey);
        }

        function renderWidgetBody(w) {
            if (w.type === 'realtime') return renderRealtimeChart(lastRealtimeData);
            if (w.type === 'trend') return renderTrendChart('📈', 'chart_trend', (lastStatsData || {}).requests_per_day);
            const m = METRICS[w.metric] || METRICS.paths;
            const items = m.get(lastStatsData || {});
            const gi = Object.keys(METRICS).indexOf(w.metric);
            const render = w.type === 'donut' ? renderDonutChart : renderBarChart;
            return render(m.icon, m.titleKey, items, gi < 0 ? 0 : gi);
        }

        function renderCustomLayout() {
            const host = document.getElementById('customLayout');
            const cols = clampCols(customLayout.cols);
            customLayout.cols = cols;
            const sel = document.getElementById('layoutCols');
            if (sel) sel.value = String(cols);
            host.style.gridTemplateColumns = 'repeat(' + cols + ', minmax(0, 1fr))';

            if (!customLayout.widgets.length) {
                host.innerHTML = '<div class="empty-state custom-empty"><div class="icon">🧩</div><p>' + t('layout_empty') + '</p></div>';
                return;
            }

            host.innerHTML = customLayout.widgets.map(function(w) {
                const cw = clampSpan(w.w, cols), ch = clampSpan(w.h, 6);
                w.w = cw; w.h = ch;
                return '<div class="widget" draggable="true" data-id="' + w.id + '"' +
                    ' style="grid-column: span ' + cw + '; grid-row: span ' + ch + ';">' +
                    '<div class="widget-head">' +
                    '<span class="widget-grip" aria-hidden="true">⠿</span>' +
                    '<span class="widget-title" title="' + escapeAttr(widgetTitle(w)) + '">' + escapeHtml(widgetTitle(w)) + '</span>' +
                    '<span class="widget-ctrls">' +
                    '<button class="w-btn" title="' + escapeAttr(t('widget_narrower')) + '" onclick="resizeWidget(\'' + w.id + '\',\'w\',-1)">◀</button>' +
                    '<button class="w-btn" title="' + escapeAttr(t('widget_wider')) + '" onclick="resizeWidget(\'' + w.id + '\',\'w\',1)">▶</button>' +
                    '<button class="w-btn" title="' + escapeAttr(t('widget_shorter')) + '" onclick="resizeWidget(\'' + w.id + '\',\'h\',-1)">▲</button>' +
                    '<button class="w-btn" title="' + escapeAttr(t('widget_taller')) + '" onclick="resizeWidget(\'' + w.id + '\',\'h\',1)">▼</button>' +
                    '<button class="w-btn danger" title="' + escapeAttr(t('widget_remove')) + '" onclick="removeWidget(\'' + w.id + '\')">✕</button>' +
                    '</span></div>' +
                    '<div class="widget-body">' + renderWidgetBody(w) + '</div>' +
                    '</div>';
            }).join('');

            wireOverviewInteractions(host);
            wireWidgetDragDrop(host);
        }

        function resizeWidget(id, dim, delta) {
            const w = customLayout.widgets.find(function(x){ return x.id === id; });
            if (!w) return;
            if (dim === 'w') w.w = clampSpan((w.w || 1) + delta, clampCols(customLayout.cols));
            else w.h = clampSpan((w.h || 1) + delta, 6);
            saveLayout();
            renderCustomLayout();
        }

        function removeWidget(id) {
            customLayout.widgets = customLayout.widgets.filter(function(x){ return x.id !== id; });
            saveLayout();
            renderCustomLayout();
            syncRealtimeTimer();
        }

        function setLayoutCols(v) {
            customLayout.cols = clampCols(v);
            saveLayout();
            renderCustomLayout();
        }

        function resetLayout() {
            customLayout = defaultLayout();
            saveLayout();
            renderCustomLayout();
            syncRealtimeTimer();
            if (layoutNeedsRealtime()) loadRealtime();
        }

        // HTML5 drag-and-drop reordering of widgets.
        let dragWidgetId = null;
        function wireWidgetDragDrop(host) {
            host.querySelectorAll('.widget').forEach(function(el) {
                el.addEventListener('dragstart', function(e) {
                    dragWidgetId = el.getAttribute('data-id');
                    el.classList.add('dragging');
                    e.dataTransfer.effectAllowed = 'move';
                    try { e.dataTransfer.setData('text/plain', dragWidgetId); } catch (_) {}
                });
                el.addEventListener('dragend', function() {
                    dragWidgetId = null;
                    el.classList.remove('dragging');
                    host.querySelectorAll('.widget').forEach(function(w){ w.classList.remove('drag-over'); });
                });
                el.addEventListener('dragover', function(e) {
                    e.preventDefault();
                    e.dataTransfer.dropEffect = 'move';
                    if (el.getAttribute('data-id') !== dragWidgetId) el.classList.add('drag-over');
                });
                el.addEventListener('dragleave', function() { el.classList.remove('drag-over'); });
                el.addEventListener('drop', function(e) {
                    e.preventDefault();
                    el.classList.remove('drag-over');
                    const targetId = el.getAttribute('data-id');
                    if (!dragWidgetId || dragWidgetId === targetId) return;
                    const ws = customLayout.widgets;
                    const from = ws.findIndex(function(x){ return x.id === dragWidgetId; });
                    const to = ws.findIndex(function(x){ return x.id === targetId; });
                    if (from < 0 || to < 0) return;
                    const moved = ws.splice(from, 1)[0];
                    ws.splice(to, 0, moved);
                    saveLayout();
                    renderCustomLayout();
                });
            });
        }

        // Widget picker modal.
        function openWidgetPicker() {
            document.getElementById('widgetPicker').classList.remove('hidden');
            onWidgetTypeChange();
        }
        function closeWidgetPicker() {
            document.getElementById('widgetPicker').classList.add('hidden');
        }
        function onWidgetTypeChange() {
            const type = document.getElementById('widgetType').value;
            const metricField = document.getElementById('widgetMetricField');
            metricField.style.display = (type === 'bar' || type === 'donut') ? '' : 'none';
        }
        function confirmAddWidget() {
            const type = document.getElementById('widgetType').value;
            const metric = document.getElementById('widgetMetric').value;
            const w = { id: 'w' + (widgetSeq++), type: type, w: 2, h: 2 };
            if (type === 'realtime' || type === 'trend') w.w = clampCols(customLayout.cols);
            if (type === 'bar' || type === 'donut') w.metric = metric;
            customLayout.widgets.push(w);
            saveLayout();
            closeWidgetPicker();
            renderCustomLayout();
            syncRealtimeTimer();
            if (w.type === 'realtime') loadRealtime();
        }

        function getStatusClass(status) {
            if (status >= 200 && status < 300) return 'status-2xx';
            if (status >= 300 && status < 400) return 'status-3xx';
            if (status >= 400 && status < 500) return 'status-4xx';
            return 'status-5xx';
        }

        async function loadRequests() {
            const params = getFilters();
            params.set('limit', pageSize);
            params.set('offset', (currentPage - 1) * pageSize);
            try {
                const res = await authFetch('/api/requests?' + params.toString());
                const data = await res.json();
                totalResults = data.total || 0;
                lastRequestRows = data.rows || [];
                renderRequests(lastRequestRows);
                updatePageInfo();
            } catch (e) {
                console.error('Failed to load requests:', e);
            }
        }

        function renderRequests(rows) {
            const tbody = document.getElementById('requestsBody');
            if (!rows || rows.length === 0) {
                tbody.innerHTML = '<tr><td colspan="11"><div class="empty-state"><div class="icon">📭</div><p>' + t('no_data') + '</p></div></td></tr>';
                return;
            }
            tbody.innerHTML = rows.map(function(r) {
                const country = r.country
                    ? '<span title="' + escapeHtml(r.country_code || '') + '">' + countryFlag(r.country_code) + escapeHtml(r.country) + '</span>'
                    : '-';
                return '<tr>' +
                    '<td>' + new Date(r.timestamp).toLocaleString(currentLang) + '</td>' +
                    '<td><code>' + escapeHtml(r.ip) + '</code></td>' +
                    '<td>' + country + '</td>' +
                    '<td>' + escapeHtml(r.domain || '-') + '</td>' +
                    '<td><strong>' + escapeHtml(r.method) + '</strong></td>' +
                    '<td title="' + escapeHtml(r.path) + '">' + escapeHtml(r.path.length > 40 ? r.path.slice(0, 40) + '…' : r.path) + '</td>' +
                    '<td title="' + escapeHtml(r.query || '') + '">' + (r.query ? escapeHtml(r.query.length > 20 ? r.query.slice(0, 20) + '…' : r.query) : '-') + '</td>' +
                    '<td><span class="status-badge ' + getStatusClass(r.status) + '">' + r.status + '</span></td>' +
                    '<td>' + escapeHtml(r.os) + '</td>' +
                    '<td>' + escapeHtml(r.browser) + '</td>' +
                    '<td title="' + escapeHtml(r.user_agent || '') + '">' + escapeHtml((r.user_agent || '').slice(0, 30)) + '…</td>' +
                    '</tr>';
            }).join('');
        }

        // countryFlag turns a two-letter ISO country code into its emoji
        // flag using regional-indicator symbols. Returns '' for unknown
        // or synthetic codes (e.g. the "LAN" placeholder).
        function countryFlag(code) {
            if (!code || code.length !== 2 || !/^[A-Za-z]{2}$/.test(code)) return '';
            const cc = code.toUpperCase();
            const flag = String.fromCodePoint(0x1F1E6 + (cc.charCodeAt(0) - 65)) +
                         String.fromCodePoint(0x1F1E6 + (cc.charCodeAt(1) - 65));
            return flag + ' ';
        }

        function prevPage() {
            if (currentPage > 1) {
                currentPage--;
                loadRequests();
            }
        }

        function nextPage() {
            if (currentPage * pageSize < totalResults) {
                currentPage++;
                loadRequests();
            }
        }

        // ---- World map (geolocation) ----------------------------------------

        async function loadGeo() {
            const params = getFilters();
            try {
                const res = await authFetch('/api/geo?' + params.toString());
                if (!res.ok) return;
                lastGeoData = await res.json();
                renderGeoMap(lastGeoData);
                // The overview "Top Countries" chart shares this data.
                if (lastStatsData) renderCharts(lastStatsData);
            } catch (e) {
                console.error('Failed to load geo:', e);
            }
        }

        // Equirectangular projection: lon/lat → SVG x/y over a 360x180
        // viewBox. Shared by the continent backdrop and the markers so
        // they line up.
        const MAP_W = 360, MAP_H = 180;
        function projX(lon) { return (lon + 180) / 360 * MAP_W; }
        function projY(lat) { return (90 - lat) / 180 * MAP_H; }

        // Rough continent outlines (lon/lat) — a low-detail backdrop that
        // gives the bubbles geographic context without shipping a heavy
        // map asset. Accuracy is intentionally loose.
        const CONTINENTS = [
            [[-168,65],[-150,71],[-95,72],[-82,63],[-64,60],[-56,50],[-78,42],[-82,28],[-98,18],[-106,23],[-114,30],[-125,40],[-130,54],[-150,59]],
            [[-81,9],[-60,11],[-50,0],[-35,-7],[-40,-23],[-49,-30],[-66,-55],[-74,-50],[-72,-30],[-81,-5]],
            [[-17,15],[-17,28],[-5,36],[11,37],[25,32],[35,31],[43,12],[51,12],[42,-2],[40,-16],[20,-35],[12,-20],[9,4],[-8,5]],
            [[-10,36],[2,44],[-2,52],[8,58],[12,66],[30,70],[42,66],[40,55],[28,46],[18,42],[8,44],[-2,43]],
            [[28,46],[40,55],[55,70],[75,73],[105,78],[140,73],[170,67],[180,64],[160,60],[145,52],[140,42],[122,40],[122,24],[108,18],[95,14],[90,22],[78,8],[72,20],[60,38],[48,40],[35,44]],
            [[114,-22],[124,-16],[133,-12],[143,-12],[150,-22],[153,-28],[146,-39],[135,-35],[123,-34],[115,-34]]
        ];

        function renderGeoMap(data) {
            const wrap = document.getElementById('mapWrap');
            const empty = document.getElementById('mapEmpty');
            const legend = document.getElementById('mapLegend');
            const totalEl = document.getElementById('mapTotal');
            const countries = (data && data.countries) || [];
            if (countries.length === 0) {
                wrap.innerHTML = '';
                legend.innerHTML = '';
                totalEl.textContent = '';
                empty.classList.remove('hidden');
                return;
            }
            empty.classList.add('hidden');
            totalEl.textContent = t('map_total', { countries: countries.length, count: data.total || 0 });

            const maxCount = countries.reduce(function(m, c) { return Math.max(m, c.count); }, 0) || 1;

            const land = CONTINENTS.map(function(poly) {
                const pts = poly.map(function(p) { return projX(p[0]).toFixed(1) + ',' + projY(p[1]).toFixed(1); }).join(' ');
                return '<polygon class="map-land" points="' + pts + '"/>';
            }).join('');

            // Graticule: equator, tropics and prime/antimeridian for context.
            let grat = '';
            [-60, -23.5, 0, 23.5, 60].forEach(function(lat) {
                const y = projY(lat).toFixed(1);
                grat += '<line class="map-graticule" x1="0" y1="' + y + '" x2="' + MAP_W + '" y2="' + y + '"/>';
            });
            [-120, -60, 0, 60, 120].forEach(function(lon) {
                const x = projX(lon).toFixed(1);
                grat += '<line class="map-graticule" x1="' + x + '" y1="0" x2="' + x + '" y2="' + MAP_H + '"/>';
            });

            const markers = countries.map(function(c) {
                const x = projX(c.lon), y = projY(c.lat);
                const r = 1.5 + Math.sqrt(c.count / maxCount) * 9;
                const name = c.country || c.country_code || t('geo_unknown');
                return '<circle class="map-marker" cx="' + x.toFixed(1) + '" cy="' + y.toFixed(1) + '" r="' + r.toFixed(1) +
                    '" data-name="' + escapeAttr(name) + '" data-code="' + escapeAttr(c.country_code || '') +
                    '" data-count="' + c.count + '"></circle>';
            }).join('');

            wrap.innerHTML = '<svg viewBox="0 0 ' + MAP_W + ' ' + MAP_H + '" role="img" aria-label="world map of request origins" preserveAspectRatio="xMidYMid meet">' +
                '<rect x="0" y="0" width="' + MAP_W + '" height="' + MAP_H + '" fill="none"/>' +
                land + grat + markers + '</svg>';
            wireMapTooltip(wrap);

            legend.innerHTML = countries.slice(0, 12).map(function(c) {
                const name = (c.country || c.country_code || t('geo_unknown'));
                return '<span class="chip">' + countryFlag(c.country_code) + escapeHtml(name) + ' <b>' + c.count.toLocaleString(currentLang) + '</b></span>';
            }).join('');
        }

        // wireMapTooltip attaches a floating tooltip (mirroring the trend
        // chart's hover label) to every marker on the world map: hovering a
        // bubble highlights it and shows the country/region name with its
        // request count, following the mouse and clamped to the map box.
        function wireMapTooltip(wrap) {
            const tip = document.createElement('div');
            tip.className = 'map-tooltip';
            wrap.appendChild(tip);
            wrap.querySelectorAll('.map-marker').forEach(function(m) {
                m.addEventListener('mouseenter', function() {
                    m.classList.add('hovered');
                    const count = parseInt(m.getAttribute('data-count'), 10) || 0;
                    tip.innerHTML = '<span class="cap">' + escapeHtml(t('trend_select')) + '</span>' +
                        '<span class="name">' + countryFlag(m.getAttribute('data-code') || '') + escapeHtml(m.getAttribute('data-name') || '') + '</span>' +
                        '<span class="val">' + escapeHtml(t('map_requests', { count: count.toLocaleString(currentLang) })) + '</span>';
                    tip.style.opacity = 1;
                });
                m.addEventListener('mousemove', function(ev) {
                    const rect = wrap.getBoundingClientRect();
                    let x = ev.clientX - rect.left + 14;
                    let y = ev.clientY - rect.top + 14;
                    if (x + tip.offsetWidth > rect.width - 4) x = ev.clientX - rect.left - tip.offsetWidth - 14;
                    if (y + tip.offsetHeight > rect.height - 4) y = ev.clientY - rect.top - tip.offsetHeight - 14;
                    tip.style.left = Math.max(0, x) + 'px';
                    tip.style.top = Math.max(0, y) + 'px';
                });
                m.addEventListener('mouseleave', function() {
                    m.classList.remove('hovered');
                    tip.style.opacity = 0;
                });
            });
        }

        // ---- Auth (Phase 2) -------------------------------------------------

        // Reads a cookie by name. Used to pull the CSRF cookie value
        // for the X-CSRF-Token header (double-submit cookie pattern).
        function getCookie(name) {
            const parts = document.cookie.split('; ');
            for (const p of parts) {
                const i = p.indexOf('=');
                if (i > 0 && p.substring(0, i) === name) {
                    return decodeURIComponent(p.substring(i + 1));
                }
            }
            return '';
        }

        let currentUser = null;
        // noAccountMode mirrors /api/auth/me's "no_account_mode" flag.
        // When true the server lets anonymous callers act as admin so
        // the operator can perform initial configuration before
        // creating the first user account.
        let noAccountMode = false;

        // authFetch is a thin wrapper around fetch() that:
        //  - always sends cookies (same-origin), so the session cookie travels
        //  - sets X-CSRF-Token on unsafe methods so the server's CSRF check passes
        //  - returns the underlying Response so callers handle status themselves
        async function authFetch(url, opts) {
            opts = opts || {};
            opts.credentials = 'same-origin';
            const method = (opts.method || 'GET').toUpperCase();
            if (method !== 'GET' && method !== 'HEAD' && method !== 'OPTIONS') {
                opts.headers = opts.headers || {};
                opts.headers['X-CSRF-Token'] = getCookie('war_csrf');
            }
            const res = await fetch(url, opts);
            if (res.status === 401) {
                // Session lapsed / never existed: bounce to login —
                // unless the server is in no-account mode, in which
                // case 401 is unexpected and we just surface it.
                if (!noAccountMode) showLogin();
            }
            return res;
        }

        function showLogin() {
            document.getElementById('authOverlay').classList.remove('hidden');
            document.getElementById('userMenu').classList.add('hidden');
            document.getElementById('tabUsersHandle').classList.add('hidden');
            document.getElementById('tabSettingsHandle').classList.add('hidden');
            currentUser = null;
        }

        function hideLogin() {
            document.getElementById('authOverlay').classList.add('hidden');
        }

        function applyUserToHeader(u) {
            currentUser = u;
            const menu = document.getElementById('userMenu');
            menu.classList.remove('hidden');
            // applyNoAccountMode may have hidden the per-button
            // controls; restore them when a real session lands.
            menu.querySelectorAll('button').forEach(function (b) { b.classList.remove('hidden'); });
            document.getElementById('userMenuName').textContent = u.username;
            document.getElementById('userMenuRole').textContent = u.role;
            if (u.role === 'admin') {
                document.getElementById('tabUsersHandle').classList.remove('hidden');
                document.getElementById('tabSettingsHandle').classList.remove('hidden');
            } else {
                document.getElementById('tabUsersHandle').classList.add('hidden');
                document.getElementById('tabSettingsHandle').classList.add('hidden');
            }
        }

        // applyNoAccountMode reveals all admin-only UI surfaces (Users,
        // Settings, password/logout buttons hidden because there is no
        // session to log out of) and surfaces the no-account-mode
        // banner. Called instead of applyUserToHeader when /me reports
        // no_account_mode=true.
        function applyNoAccountMode() {
            currentUser = null;
            const menu = document.getElementById('userMenu');
            menu.classList.remove('hidden');
            document.getElementById('userMenuName').textContent = t('user_anonymous');
            document.getElementById('userMenuRole').textContent = t('role_setup');
            // Hide change-password / logout since there is no session.
            const headerActions = menu.querySelectorAll('button');
            headerActions.forEach(function (b) { b.classList.add('hidden'); });
            document.getElementById('tabUsersHandle').classList.remove('hidden');
            document.getElementById('tabSettingsHandle').classList.remove('hidden');
        }

        async function checkSession() {
            try {
                const res = await fetch('/api/auth/me', { credentials: 'same-origin' });
                if (!res.ok) { showLogin(); return false; }
                const data = await res.json();
                noAccountMode = !!data.no_account_mode;
                if (noAccountMode) {
                    applyNoAccountMode();
                    hideLogin();
                    // Surface the setup wizard / banner straight away.
                    updateSetupBanner({ noAccount: true });
                    return true;
                }
                if (!data.user) { showLogin(); return false; }
                applyUserToHeader(data.user);
                hideLogin();
                // Refresh the "no sources configured" banner for admins.
                if (data.user.role === 'admin') {
                    updateSetupBanner({ noAccount: false });
                }
                return true;
            } catch (e) {
                showLogin();
                return false;
            }
        }

        // updateSetupBanner shows or hides the first-run banner above
        // the header. opts.noAccount = true forces the "create first
        // account" message; otherwise we probe /api/config to decide
        // whether the runtime has any sources configured.
        async function updateSetupBanner(opts) {
            opts = opts || {};
            const banner = document.getElementById('setupBanner');
            const title = document.getElementById('setupBannerTitle');
            const body = document.getElementById('setupBannerBody');
            const btn = banner.querySelector('button.btn-primary');
            const dismissed = sessionStorage.getItem('setupBannerDismissed') === '1';

            if (opts.noAccount) {
                title.textContent = t('setup_banner_noaccount_title');
                body.textContent = t('setup_banner_noaccount_body');
                btn.textContent = t('setup_banner_noaccount_btn');
                btn.dataset.target = 'users';
                banner.classList.remove('hidden');
                return;
            }
            // For users without admin role we never show the banner.
            if (!currentUser || currentUser.role !== 'admin') {
                banner.classList.add('hidden');
                return;
            }
            if (dismissed) {
                banner.classList.add('hidden');
                return;
            }
            try {
                const res = await fetch('/api/config', { credentials: 'same-origin' });
                if (!res.ok) { banner.classList.add('hidden'); return; }
                const data = await res.json();
                const sources = (data.runtime && data.runtime.sources) || [];
                if (sources.length === 0) {
                    title.textContent = t('setup_banner_title');
                    body.textContent = t('setup_banner_body');
                    btn.textContent = t('setup_banner_btn');
                    btn.dataset.target = 'settings';
                    banner.classList.remove('hidden');
                } else {
                    banner.classList.add('hidden');
                }
            } catch (e) {
                banner.classList.add('hidden');
            }
        }

        function openSetup() {
            const banner = document.getElementById('setupBanner');
            const btn = banner.querySelector('button.btn-primary');
            const target = btn.dataset.target || 'settings';
            switchTab(target);
        }

        function dismissSetupBanner() {
            sessionStorage.setItem('setupBannerDismissed', '1');
            document.getElementById('setupBanner').classList.add('hidden');
        }

        async function doLogin(event) {
            event.preventDefault();
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            const errEl = document.getElementById('loginError');
            errEl.textContent = '';
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    credentials: 'same-origin',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: username, password: password })
                });
                if (!res.ok) {
                    errEl.textContent = t('auth_invalid');
                    return false;
                }
                const data = await res.json();
                applyUserToHeader(data.user);
                hideLogin();
                document.getElementById('loginPassword').value = '';
                loadStats();
                loadGeo();
                if (chartViewMode === 'realtime' || (chartViewMode === 'custom' && layoutNeedsRealtime())) {
                    loadRealtime();
                }
                syncRealtimeTimer();
                return false;
            } catch (e) {
                errEl.textContent = t('auth_invalid');
                return false;
            }
        }

        async function doLogout() {
            await authFetch('/api/auth/logout', { method: 'POST' });
            showLogin();
        }

        async function changeOwnPassword() {
            const cur = prompt(t('auth_current_password'));
            if (cur === null) return;
            const next = prompt(t('auth_new_password'));
            if (next === null) return;
            const res = await authFetch('/api/users/me/password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ current_password: cur, new_password: next })
            });
            if (!res.ok) {
                const data = await res.json().catch(function() { return {}; });
                alert(data.error || 'error');
                return;
            }
            // Server has invalidated the session; force re-login.
            showLogin();
        }

        // ---- Users admin panel (admin only) ---------------------------------

        async function loadUsers() {
            const res = await authFetch('/api/users');
            if (!res.ok) return;
            const data = await res.json();
            const body = document.getElementById('usersBody');
            body.innerHTML = (data.users || []).map(function(u) {
                const last = u.last_login_at ? new Date(u.last_login_at).toLocaleString(currentLang) : t('users_never');
                const statusLabel = u.disabled ? t('users_disabled') : t('users_active');
                const toggleLabel = u.disabled ? t('users_enable') : t('users_disable');
                const roleSwitchLabel = u.role === 'admin' ? t('users_make_viewer') : t('users_make_admin');
                const targetRole = u.role === 'admin' ? 'viewer' : 'admin';
                const isSelf = currentUser && currentUser.id === u.id;
                const disableBtn = isSelf ? '' : '<button class="btn btn-secondary" onclick="toggleUserDisabled(' + u.id + ',' + (!u.disabled) + ')">' + escapeHtml(toggleLabel) + '</button>';
                const deleteBtn = isSelf ? '' : '<button class="btn btn-secondary" onclick="deleteUser(' + u.id + ')">' + escapeHtml(t('users_delete')) + '</button>';
                const roleBtn = '<button class="btn btn-secondary" onclick="setUserRole(' + u.id + ',\'' + targetRole + '\')">' + escapeHtml(roleSwitchLabel) + '</button>';
                return '<tr>' +
                    '<td>' + u.id + '</td>' +
                    '<td>' + escapeHtml(u.username) + '</td>' +
                    '<td>' + escapeHtml(u.role) + '</td>' +
                    '<td>' + escapeHtml(statusLabel) + '</td>' +
                    '<td>' + escapeHtml(last) + '</td>' +
                    '<td class="actions">' + roleBtn + disableBtn + deleteBtn + '</td>' +
                    '</tr>';
            }).join('');
        }

        async function createUser() {
            const username = document.getElementById('newUserName').value.trim();
            const password = document.getElementById('newUserPassword').value;
            const role = document.getElementById('newUserRole').value;
            const errEl = document.getElementById('usersError');
            errEl.textContent = '';
            if (!username || !password) { errEl.textContent = 'username/password required'; return; }
            const res = await authFetch('/api/users', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: username, password: password, role: role })
            });
            if (!res.ok) {
                const data = await res.json().catch(function() { return {}; });
                errEl.textContent = data.error || 'error';
                return;
            }
            document.getElementById('newUserName').value = '';
            document.getElementById('newUserPassword').value = '';
            loadUsers();
            // If this was the first user we just exited no-account mode
            // — re-run the auth probe so the UI starts requiring login
            // for future requests instead of silently continuing as
            // anonymous-admin.
            if (noAccountMode) {
                noAccountMode = false;
                // Force a login screen so the new credentials are
                // exercised; the just-created account has no session.
                showLogin();
            }
        }

        async function patchUser(id, payload) {
            const errEl = document.getElementById('usersError');
            errEl.textContent = '';
            const res = await authFetch('/api/users/' + id, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (!res.ok) {
                const data = await res.json().catch(function() { return {}; });
                // Surface server-side guards (e.g. refusing to demote/disable
                // the last administrator) instead of silently doing nothing.
                errEl.textContent = data.error || 'error';
            }
            loadUsers();
        }

        async function toggleUserDisabled(id, disabled) {
            await patchUser(id, { disabled: disabled });
        }

        async function setUserRole(id, role) {
            await patchUser(id, { role: role });
        }

        async function deleteUser(id) {
            if (!confirm(t('users_confirm_delete'))) return;
            await authFetch('/api/users/' + id, { method: 'DELETE' });
            loadUsers();
        }

        // ---- Settings panel (admin only) ------------------------------------

        let settingsSchema = null;
        let settingsSources = [];

        function escapeAttr(s) {
            return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;');
        }

        function renderSourceRows() {
            const host = document.getElementById('settingsSources');
            const engineOpts = (settingsSchema && settingsSchema.engines || ['auto','nginx','apache','custom']);
            const protoOpts = (settingsSchema && settingsSchema.syslog_protos || ['udp','tcp']);
            host.innerHTML = settingsSources.map(function(s, i) {
                const presets = (s.format && s.format.engine === 'apache'
                    ? (settingsSchema && settingsSchema.apache_presets || ['common','combined','vhost_combined'])
                    : (settingsSchema && settingsSchema.nginx_presets || ['combined','vhost_combined']));
                const engineSelect = engineOpts.map(function(e) {
                    return '<option value="' + e + '"' + (s.format && s.format.engine === e ? ' selected' : '') + '>' + e + '</option>';
                }).join('');
                const presetSelect = presets.map(function(p) {
                    return '<option value="' + p + '"' + (s.format && s.format.preset === p ? ' selected' : '') + '>' + p + '</option>';
                }).join('');
                const protoSelect = protoOpts.map(function(p) {
                    return '<option value="' + p + '"' + (s.proto === p ? ' selected' : '') + '>' + p + '</option>';
                }).join('');
                const isFile = s.type === 'file';
                const isDir = s.type === 'dir';
                const isSyslog = s.type === 'syslog';
                const isCustom = s.format && s.format.engine === 'custom';
                // Path field with an attached visual Browse button. The
                // picker mode (file vs dir) follows the source type.
                const pathField = function(mode) {
                    return '<div class="field span-2"><label data-i18n="settings_path"></label>' +
                        '<div class="input-with-btn">' +
                        '<input type="text" data-field="path" value="' + escapeAttr(s.path || '') + '">' +
                        '<button type="button" class="btn-browse" onclick="openPicker(' + i + ',\'' + mode + '\')"><span aria-hidden="true">📂</span> <span data-i18n="settings_browse"></span></button>' +
                        '</div></div>';
                };
                let typeBlock;
                if (isFile) {
                    typeBlock =
                        pathField('file') +
                        '<div class="field"><label class="inline-check"><input type="checkbox" data-field="read_compressed"' + (s.read_compressed ? ' checked' : '') + '> <span data-i18n="settings_read_compressed"></span></label></div>';
                } else if (isDir) {
                    typeBlock =
                        pathField('dir') +
                        '<div class="field"><label data-i18n="settings_pattern_glob"></label><input type="text" data-field="pattern_glob" value="' + escapeAttr(s.pattern || '') + '"></div>' +
                        '<div class="field"><label class="inline-check"><input type="checkbox" data-field="recursive"' + (s.recursive ? ' checked' : '') + '> <span data-i18n="settings_recursive"></span></label></div>' +
                        '<div class="field"><label class="inline-check"><input type="checkbox" data-field="read_compressed"' + (s.read_compressed ? ' checked' : '') + '> <span data-i18n="settings_read_compressed"></span></label></div>';
                } else {
                    typeBlock =
                        '<div class="field"><label data-i18n="settings_addr"></label><input type="text" data-field="addr" value="' + escapeAttr(s.addr || '') + '"></div>' +
                        '<div class="field"><label data-i18n="settings_proto"></label><select data-field="proto">' + protoSelect + '</select></div>';
                }
                return '<div class="source-card" data-i="' + i + '">' +
                    '<div class="source-card-head">' +
                    '<span class="source-type-badge">' + escapeHtml(s.type) + '</span>' +
                    '<button class="btn-icon-danger" onclick="removeSourceRow(' + i + ')"><span aria-hidden="true">🗑</span> <span data-i18n="settings_remove"></span></button>' +
                    '</div>' +
                    '<div class="source-grid">' +
                    '<div class="field"><label data-i18n="settings_source_name"></label><input type="text" data-field="name" value="' + escapeAttr(s.name || '') + '"></div>' +
                    typeBlock +
                    '<div class="field"><label data-i18n="settings_engine"></label><select data-field="engine">' + engineSelect + '</select></div>' +
                    (isCustom
                        ? '<div class="field span-2"><label data-i18n="settings_pattern"></label><input type="text" data-field="pattern" value="' + escapeAttr(s.format && s.format.pattern || '') + '"></div>'
                        : '<div class="field"><label data-i18n="settings_preset"></label><select data-field="preset">' + presetSelect + '</select></div>') +
                    '</div></div>';
            }).join('');
            // Wire change listeners so edits flow back into settingsSources.
            host.querySelectorAll('.source-card').forEach(function(row) {
                const i = parseInt(row.getAttribute('data-i'), 10);
                row.querySelectorAll('[data-field]').forEach(function(el) {
                    el.addEventListener('change', function() {
                        const f = el.getAttribute('data-field');
                        let v = el.type === 'checkbox' ? el.checked : el.value;
                        const s = settingsSources[i];
                        if (f === 'engine' || f === 'preset' || f === 'pattern') {
                            s.format = s.format || {};
                            s.format[f] = v;
                            // Engine swap can change which preset list is valid;
                            // re-render so the dropdown updates.
                            if (f === 'engine') renderSourceRows();
                        } else if (f === 'pattern_glob') {
                            // The directory source's filename glob lives in
                            // `s.pattern`; we use a different data-field
                            // name so it doesn't collide with the
                            // custom-format `format.pattern` above.
                            s.pattern = v;
                        } else {
                            s[f] = v;
                        }
                    });
                });
            });
            applyLanguage();
        }

        // ===== Visual path picker =====
        let pickerState = { sourceIndex: -1, mode: 'file', cwd: '' };

        function formatSize(n) {
            if (!n) return '';
            const units = ['B', 'KB', 'MB', 'GB', 'TB'];
            let i = 0, v = n;
            while (v >= 1024 && i < units.length - 1) { v /= 1024; i++; }
            return (i === 0 ? v : v.toFixed(1)) + ' ' + units[i];
        }

        function openPicker(sourceIndex, mode) {
            pickerState = { sourceIndex: sourceIndex, mode: mode, cwd: '' };
            document.getElementById('pathPicker').classList.remove('hidden');
            document.getElementById('pickerTitle').textContent =
                mode === 'dir' ? t('picker_title_folder') : t('picker_title_file');
            // The "select this folder" button only makes sense in dir mode.
            document.getElementById('pickerSelectDir').classList.toggle('hidden', mode !== 'dir');
            document.getElementById('pickerHint').textContent =
                mode === 'dir' ? t('picker_hint_folder') : t('picker_hint_file');
            // Seed from the current path value so the picker opens near it.
            const s = settingsSources[sourceIndex];
            browseTo(s && s.path ? s.path : '');
        }

        function closePicker() {
            document.getElementById('pathPicker').classList.add('hidden');
        }

        async function browseTo(path) {
            const errEl = document.getElementById('pickerError');
            errEl.classList.add('hidden');
            errEl.textContent = '';
            const listEl = document.getElementById('pickerList');
            listEl.innerHTML = '<div class="browse-empty">…</div>';
            let res;
            try {
                res = await authFetch('/api/admin/browse?path=' + encodeURIComponent(path || ''));
            } catch (e) {
                errEl.textContent = String(e); errEl.classList.remove('hidden');
                listEl.innerHTML = ''; return;
            }
            const data = await res.json().catch(function(){ return {}; });
            if (!res.ok) {
                errEl.textContent = data.error || 'browse failed';
                errEl.classList.remove('hidden');
                listEl.innerHTML = '';
                return;
            }
            pickerState.cwd = data.path || '';
            document.getElementById('pickerPath').textContent =
                data.at_roots ? t('picker_roots') : (data.path || '');
            // Disable "select this folder" while at the roots screen.
            const selBtn = document.getElementById('pickerSelectDir');
            if (pickerState.mode === 'dir') {
                selBtn.classList.toggle('hidden', !!data.at_roots);
            }
            renderBrowseList(data);
        }

        function renderBrowseList(data) {
            const listEl = document.getElementById('pickerList');
            let html = '';
            if (data.parent !== undefined && data.parent !== '') {
                html += '<button class="browse-item is-up" data-go="' + escapeAttr(data.parent) + '">' +
                    '<span class="b-ico" aria-hidden="true">↩</span><span class="b-name">..</span></button>';
            }
            const entries = data.entries || [];
            if (!entries.length && !html) {
                listEl.innerHTML = '<div class="browse-empty">' + t('picker_empty') + '</div>';
                return;
            }
            entries.forEach(function(e) {
                if (e.is_dir) {
                    html += '<button class="browse-item" data-go="' + escapeAttr(e.path) + '">' +
                        '<span class="b-ico" aria-hidden="true">📁</span>' +
                        '<span class="b-name">' + escapeHtml(e.name) + '</span></button>';
                } else {
                    // Files are only selectable in file mode; in dir mode
                    // they are shown greyed for context but not clickable.
                    const selectable = pickerState.mode === 'file';
                    html += '<button class="browse-item" data-pick="' + escapeAttr(e.path) + '"' +
                        (selectable ? '' : ' disabled style="opacity:.45;cursor:default;"') + '>' +
                        '<span class="b-ico" aria-hidden="true">📄</span>' +
                        '<span class="b-name">' + escapeHtml(e.name) + '</span>' +
                        '<span class="b-size">' + formatSize(e.size) + '</span></button>';
                }
            });
            listEl.innerHTML = html;
            listEl.querySelectorAll('[data-go]').forEach(function(el) {
                el.addEventListener('click', function() { browseTo(el.getAttribute('data-go')); });
            });
            listEl.querySelectorAll('[data-pick]').forEach(function(el) {
                el.addEventListener('click', function() { pickerApply(el.getAttribute('data-pick')); });
            });
        }

        function pickerChooseCurrent() {
            if (pickerState.cwd) pickerApply(pickerState.cwd);
        }

        function pickerApply(path) {
            const s = settingsSources[pickerState.sourceIndex];
            if (s) { s.path = path; renderSourceRows(); }
            closePicker();
        }

        function addSourceRow(type) {
            const row = {
                name: '',
                type: type,
                format: { engine: 'nginx', preset: 'combined' }
            };
            if (type === 'file') {
                row.path = '';
            } else if (type === 'dir') {
                row.path = '';
                row.pattern = 'access*.log*';
                row.recursive = false;
                row.read_compressed = false;
            } else if (type === 'syslog') {
                row.addr = ':1514';
                row.proto = 'udp';
            }
            settingsSources.push(row);
            renderSourceRows();
        }

        function removeSourceRow(i) {
            settingsSources.splice(i, 1);
            renderSourceRows();
        }

        async function loadSettings() {
            const errEl = document.getElementById('settingsError');
            const stEl = document.getElementById('settingsStatus');
            errEl.textContent = '';
            stEl.textContent = '';
            const res = await authFetch('/api/config');
            if (!res.ok) {
                errEl.textContent = 'failed to load config';
                return;
            }
            const data = await res.json();
            settingsSchema = data.schema || null;
            // Bootstrap (read-only).
            const b = data.bootstrap || {};
            document.getElementById('bootstrapListenAddr').textContent = b.listen_addr || '';
            document.getElementById('bootstrapDBPath').textContent = b.db_path || '';
            document.getElementById('bootstrapAllowedRoots').textContent = (b.allowed_log_roots || []).join(', ') || t('settings_any');
            // Runtime fields.
            const rc = data.runtime || {};
            document.getElementById('settingsWatch').checked = !!rc.watch;
            document.getElementById('settingsGeo').checked = rc.geo_enabled !== false;
            document.getElementById('settingsKeywords').value = (rc.keywords || []).join(', ');
            // Deep-copy sources so editing the form doesn't mutate the server snapshot.
            settingsSources = JSON.parse(JSON.stringify(rc.sources || []));
            renderSourceRows();
        }

        function collectRuntimePayload() {
            const watch = document.getElementById('settingsWatch').checked;
            const geoEnabled = document.getElementById('settingsGeo').checked;
            const kwRaw = document.getElementById('settingsKeywords').value || '';
            const keywords = kwRaw.split(',').map(function(s){return s.trim();}).filter(function(s){return s.length > 0;});
            // Strip empty string fields that the server doesn't want
            // (e.g. addr on a file source from a stale form).
            const sources = settingsSources.map(function(s) {
                const out = { name: s.name || '', type: s.type, format: {} };
                out.format.engine = (s.format && s.format.engine) || 'auto';
                if (out.format.engine === 'custom') {
                    out.format.pattern = (s.format && s.format.pattern) || '';
                } else {
                    out.format.preset = (s.format && s.format.preset) || '';
                }
                if (s.type === 'file') {
                    out.path = s.path || '';
                    out.read_compressed = !!s.read_compressed;
                } else if (s.type === 'dir') {
                    out.path = s.path || '';
                    out.pattern = s.pattern || '';
                    out.recursive = !!s.recursive;
                    out.read_compressed = !!s.read_compressed;
                } else if (s.type === 'syslog') {
                    out.addr = s.addr || '';
                    out.proto = s.proto || 'udp';
                }
                return out;
            });
            return { watch: watch, keywords: keywords, sources: sources, geo_enabled: geoEnabled };
        }

        async function saveSettings() {
            const errEl = document.getElementById('settingsError');
            const stEl = document.getElementById('settingsStatus');
            errEl.textContent = '';
            stEl.textContent = '';
            const payload = collectRuntimePayload();
            const res = await authFetch('/api/config', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (!res.ok) {
                const data = await res.json().catch(function(){return {};});
                errEl.textContent = data.error || 'save failed';
                return;
            }
            stEl.textContent = t('settings_saved');
            // After a save, the "no sources configured" banner may no
            // longer apply — re-evaluate.
            updateSetupBanner({ noAccount: noAccountMode });
        }

        async function confirmRestart() {
            if (!confirm(t('settings_restart_confirm'))) return;
            const stEl = document.getElementById('settingsStatus');
            const errEl = document.getElementById('settingsError');
            errEl.textContent = '';
            stEl.textContent = t('settings_restarting');
            try {
                await authFetch('/api/admin/restart', { method: 'POST' });
            } catch (e) {
                // Connection dropping mid-restart is expected.
            }
            // Poll for the server to come back, then reload.
            const start = Date.now();
            (function poll() {
                if (Date.now() - start > 30000) {
                    errEl.textContent = t('settings_restart_timeout');
                    return;
                }
                fetch('/api/auth/me', { credentials: 'same-origin' }).then(function(r) {
                    if (r.ok || r.status === 401) {
                        window.location.reload();
                    } else {
                        setTimeout(poll, 1000);
                    }
                }).catch(function() {
                    setTimeout(poll, 1000);
                });
            })();
        }

        document.addEventListener('DOMContentLoaded', function() {
            document.querySelector('.theme-toggle').textContent = savedTheme === 'light' ? '🌙' : '☀️';
            applyLanguage();
            // Always start with the login overlay until /me confirms a session.
            showLogin();
            checkSession().then(function(ok) {
                if (ok) {
                    loadStats();
                    loadGeo();
                    if (chartViewMode === 'realtime' || (chartViewMode === 'custom' && layoutNeedsRealtime())) {
                        loadRealtime();
                    }
                    syncRealtimeTimer();
                }
            });
        });
    </script>
</body>
</html>
