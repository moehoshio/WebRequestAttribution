name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
            ext: .exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # modernc.org/sqlite is pure Go, so every target cross-compiles
      # statically with CGO disabled — no C toolchains required.
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -ldflags="-s -w" -o web-req-attr-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} ./cmd/

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: web-req-attr-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
